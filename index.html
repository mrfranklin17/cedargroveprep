<style>
  :root {
    --forest: #0F3B2C;
    --green: #2E7D46;
    --green-d: #256A3B;
    --sage: #9CBB8A;
    --sage-d: #7C9C6B;
    --sky: #C6DAE2;
    --sky-tint: #EBF3F6;
    --sky-line: #C3D6DE;
    --paper: #F6F8F3;
    --card: #FFFFFF;
    --ink: #1B2A20;
    --ink-soft: #56655A;
    --mute: #9AA79C;
    --line: #DCE3D6;
    --line-soft: #E8EDE2;
    --serif: "Newsreader", Georgia, serif;
    --sans: "Inter", system-ui, -apple-system, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
    background: var(--paper); color: var(--ink);
    font-family: var(--sans); font-size: 16px; line-height: 1.5; -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; }

  /* ---------- App bar ---------- */
  .appbar { flex: none; background: var(--forest); color: #EFF4EA; padding-top: env(safe-area-inset-top); }
  .appbar-inner { height: 54px; display: flex; align-items: center; gap: 10px; padding: 0 14px; }
  .aemblem { width: 30px; height: 26px; flex: none; }
  .atitle { font-family: var(--serif); font-size: 1.12rem; font-weight: 600; letter-spacing: .2px; }
  .backbtn {
    border: none; background: rgba(255,255,255,.12); color: #EFF4EA; width: 34px; height: 34px;
    border-radius: 9px; font-size: 1.4rem; line-height: 1; cursor: pointer; flex: none; display: flex; align-items: center; justify-content: center;
  }
  .backbtn:active { background: rgba(255,255,255,.22); }

  /* ---------- Scroll area ---------- */
  .screen { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
  .screen-inner { max-width: 640px; margin: 0 auto; padding: 16px 16px 30px; }

  /* ---------- Tab bar ---------- */
  .tabbar { flex: none; background: var(--card); border-top: 1px solid var(--line); display: flex; padding-bottom: env(safe-area-inset-bottom); }
  .tab { flex: 1; border: none; background: none; padding: 9px 4px 8px; display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--mute); cursor: pointer; }
  .tab svg { width: 23px; height: 23px; }
  .tab .tl { font-size: .64rem; letter-spacing: .02em; font-weight: 500; }
  .tab.on { color: var(--green-d); }
  .tab:active { opacity: .7; }

  /* ---------- Segmented control ---------- */
  .seg { display: inline-flex; background: var(--line-soft); border-radius: 11px; padding: 3px; margin-bottom: 16px; }
  .seg button { border: none; background: none; font-size: .84rem; padding: 8px 18px; border-radius: 8px; color: var(--ink-soft); cursor: pointer; }
  .seg button.on { background: var(--card); color: var(--forest); font-weight: 600; box-shadow: 0 1px 2px rgba(0,0,0,.09); }

  /* ---------- Topic rows ---------- */
  .trow { display: flex; align-items: center; gap: 13px; width: 100%; text-align: left; padding: 14px; background: var(--card); border: 1px solid var(--line); border-radius: 13px; margin-bottom: 10px; cursor: pointer; }
  .trow:active { background: var(--paper); }
  .tmid { flex: 1; min-width: 0; }
  .tmid .tn { font-family: var(--serif); font-size: 1.06rem; font-weight: 600; color: var(--forest); }
  .tmid .tsub { font-family: var(--mono); font-size: .58rem; letter-spacing: .1em; text-transform: uppercase; color: var(--sage-d); margin-top: 3px; }
  .trow .chev { color: var(--mute); font-size: 1.3rem; flex: none; }
  .ringwrap { flex: none; position: relative; width: 34px; height: 34px; }
  .ringwrap .rc { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: .56rem; color: var(--green-d); font-weight: 700; }

  /* ---------- Section intro ---------- */
  .lead { font-size: .93rem; color: var(--ink-soft); margin: 0 0 18px; }
  .lead b { color: var(--forest); }
  .eyebrow { font-family: var(--mono); font-size: .6rem; letter-spacing: .16em; text-transform: uppercase; color: var(--sage-d); margin: 2px 0 10px; }

  /* ---------- Question cards ---------- */
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; margin-bottom: 11px; overflow: hidden; }
  .card.solid { border-color: var(--green); box-shadow: inset 3px 0 0 var(--green); }
  .card-top { display: flex; gap: 11px; padding: 15px; cursor: pointer; align-items: flex-start; }
  .card-top:active { background: var(--paper); }
  .qcode { font-family: var(--mono); font-size: .62rem; font-weight: 700; color: var(--sage-d); padding-top: 3px; flex: none; }
  .qmain { flex: 1; min-width: 0; }
  .qtext { font-family: var(--serif); font-size: 1.06rem; line-height: 1.32; color: var(--forest); }
  .owners { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-top: 9px; }
  .chip { font-family: var(--mono); font-size: .56rem; letter-spacing: .04em; text-transform: uppercase; white-space: nowrap; padding: 3px 8px; border-radius: 20px; border: 1px solid var(--line); color: var(--ink-soft); background: var(--paper); }
  .chip.lead { border-color: var(--green); color: var(--green-d); background: #E7F1EA; }
  .chip.all { border-color: var(--sky-line); color: var(--forest); background: #DDEBF0; }
  .hint { font-family: var(--mono); font-size: .62rem; letter-spacing: .07em; text-transform: uppercase; color: var(--green-d); margin-top: 11px; display: inline-flex; align-items: center; gap: 5px; }
  .hint .chev { transition: transform .2s ease; }
  .card.open .hint .chev { transform: rotate(90deg); }
  .answer { display: none; padding: 0 15px 15px; }
  .card.open .answer { display: block; animation: fade .24s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  .answer .div { height: 1px; background: var(--line-soft); margin: 0 0 4px; }
  .answer h4 { font-family: var(--mono); font-size: .58rem; letter-spacing: .13em; text-transform: uppercase; color: var(--sage-d); margin: 15px 0 8px; }
  .answer ul { margin: 0; padding-left: 18px; }
  .answer li { margin-bottom: 8px; font-size: .95rem; }
  .cite { font-family: var(--mono); font-size: .64rem; color: var(--ink-soft); background: var(--paper); border: 1px solid var(--line-soft); padding: 8px 11px; border-radius: 7px; margin-top: 13px; }
  .coach { background: var(--sky-tint); border: 1px solid var(--sky-line); border-left: 3px solid var(--green); padding: 11px 13px; border-radius: 7px; margin-top: 12px; font-size: .88rem; }
  .coach b { color: var(--green-d); }
  .rate { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; padding-top: 13px; border-top: 1px solid var(--line-soft); }
  .rate span { font-family: var(--mono); font-size: .56rem; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-soft); width: 100%; }
  .rate button { font-size: .84rem; padding: 9px 8px; border-radius: 22px; min-height: 42px; border: 1px solid var(--line); background: var(--card); color: var(--ink-soft); cursor: pointer; flex: 1; transition: background .15s, color .15s; }
  .rate button:active { transform: scale(.97); }
  .rate button.on { background: var(--forest); border-color: var(--forest); color: #EFF4EA; }
  .rate button.on.ok { background: var(--green); border-color: var(--green); }

  /* ---------- My Seat ---------- */
  .roleopt { width: 100%; text-align: left; display: block; padding: 14px 15px; border: 1px solid var(--line); border-radius: 13px; background: var(--card); margin-bottom: 10px; cursor: pointer; }
  .roleopt:active { background: var(--paper); }
  .roleopt .n { font-family: var(--serif); font-size: 1.08rem; font-weight: 600; color: var(--forest); }
  .roleopt .r { font-family: var(--mono); font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; color: var(--green-d); margin-top: 3px; }
  .roleopt.sel { border-color: var(--green); box-shadow: inset 3px 0 0 var(--green); }
  .seatcard { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
  .seatcard .nm { font-family: var(--serif); font-size: 1.35rem; font-weight: 600; color: var(--forest); line-height: 1.1; }
  .seatcard .rl { font-family: var(--mono); font-size: .64rem; letter-spacing: .1em; text-transform: uppercase; color: var(--green-d); margin: 5px 0 14px; }
  .seatcard .ow { font-size: .92rem; color: var(--ink); }
  .seatcard .ow b { color: var(--forest); }
  .seatcard .coi { background: var(--sky-tint); border: 1px solid var(--sky-line); border-left: 3px solid var(--green); padding: 11px 13px; border-radius: 8px; margin-top: 13px; font-size: .86rem; }
  .seatcard .coi b { color: var(--green-d); }
  .readbar { margin: 16px 0 4px; }
  .readbar .rl2 { font-size: .84rem; color: var(--ink-soft); margin-bottom: 7px; }
  .readbar .rl2 b { color: var(--forest); font-weight: 600; }
  .track { height: 9px; background: var(--line); border-radius: 5px; overflow: hidden; }
  .track i { display: block; height: 100%; background: var(--green); border-radius: 5px; transition: width .4s ease; }
  .btn { display: block; width: 100%; text-align: center; padding: 13px; border-radius: 12px; font-size: .92rem; font-weight: 600; cursor: pointer; border: 1px solid var(--line); }
  .btn.primary { background: var(--forest); color: #EFF4EA; border-color: var(--forest); margin-top: 6px; }
  .btn.ghost { background: var(--card); color: var(--green-d); margin-top: 10px; }
  .btn:active { opacity: .88; }

  /* ---------- Progress ---------- */
  .bigring { display: flex; align-items: center; gap: 18px; background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 18px; margin-bottom: 18px; }
  .bigring .lbl { font-size: .95rem; color: var(--ink-soft); }
  .bigring .lbl b { display: block; font-family: var(--serif); font-size: 1.9rem; color: var(--forest); line-height: 1; margin-bottom: 4px; }
  .prow { display: flex; align-items: center; gap: 12px; padding: 12px 2px; border-bottom: 1px solid var(--line-soft); }
  .prow:last-child { border-bottom: none; }
  .prow .pn { flex: 1; font-size: .92rem; color: var(--ink); }
  .prow .pc { font-family: var(--mono); font-size: .68rem; color: var(--ink-soft); }
  .prow .ptrack { width: 84px; height: 7px; background: var(--line); border-radius: 4px; overflow: hidden; flex: none; }
  .prow .ptrack i { display: block; height: 100%; background: var(--green); }
  .info { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px; margin: 20px 0 14px; }
  .info h3 { font-family: var(--serif); font-size: 1.1rem; color: var(--forest); margin: 0 0 8px; font-weight: 600; }
  .info p { font-size: .9rem; color: var(--ink-soft); margin: 0 0 8px; }
  .info p:last-child { margin-bottom: 0; }
  .installnote { font-size: .82rem; color: var(--ink-soft); background: var(--sky-tint); border: 1px solid var(--sky-line); border-radius: 10px; padding: 12px 14px; margin-top: 12px; }
  .installnote b { color: var(--forest); }

  /* ---------- Quiz ---------- */
  .roleopt.qz-disabled { opacity: .5; }
  .chiprow { display: flex; flex-wrap: wrap; gap: 8px; margin: 4px 0 16px; }
  .chiprow button { border: 1px solid var(--line); background: var(--card); color: var(--ink-soft); font-size: .82rem; padding: 8px 14px; border-radius: 20px; cursor: pointer; }
  .chiprow button.on { background: var(--forest); border-color: var(--forest); color: #EFF4EA; }
  .qz-best { font-size: .82rem; color: var(--ink-soft); background: var(--sky-tint); border: 1px solid var(--sky-line); border-radius: 10px; padding: 10px 14px; margin-top: 14px; }
  .qz-best b { color: var(--forest); }

  .qz-progwrap { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .qz-progtext { font-family: var(--mono); font-size: .62rem; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-soft); flex: none; }
  .qz-track { height: 6px; background: var(--line); border-radius: 4px; overflow: hidden; flex: 1; }
  .qz-track i { display: block; height: 100%; background: var(--green); transition: width .3s ease; }
  .qz-streak { display: flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: .66rem; font-weight: 700; color: var(--green-d); flex: none; white-space: nowrap; }
  .qz-streak svg { width: 14px; height: 14px; }

  .qz-code { font-family: var(--mono); font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; color: var(--sage-d); margin-bottom: 8px; }
  .qz-stem { font-family: var(--serif); font-size: 1.22rem; font-weight: 600; color: var(--forest); line-height: 1.32; margin-bottom: 20px; }
  .qz-choices { display: flex; flex-direction: column; gap: 10px; }
  .qz-choice { text-align: left; padding: 14px 15px; border: 1px solid var(--line); border-radius: 12px; background: var(--card); font-size: .96rem; color: var(--ink); cursor: pointer; }
  .qz-choice:active { background: var(--paper); }
  .qz-choice.correct { border-color: var(--green); background: #E7F1EA; color: var(--green-d); font-weight: 600; }
  .qz-choice.wrong { border-color: #C0503F; background: #FBEAE6; color: #B44430; font-weight: 600; }
  .qz-choice[disabled] { cursor: default; }

  .qz-feedback { margin-top: 16px; padding: 14px 15px; border-radius: 12px; font-size: .92rem; animation: fade .24s ease; }
  .qz-feedback.ok { background: #E7F1EA; border: 1px solid var(--green); }
  .qz-feedback.no { background: var(--sky-tint); border: 1px solid var(--sky-line); border-left: 3px solid var(--green); }
  .qz-feedback b { display: block; font-family: var(--mono); font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; color: var(--green-d); }
  .qz-cite { font-family: var(--mono); font-size: .62rem; color: var(--ink-soft); margin-top: 12px; }

  .qz-resultwrap { position: relative; }
  .qz-badge { display: inline-block; font-family: var(--mono); font-size: .6rem; letter-spacing: .08em; text-transform: uppercase; padding: 5px 10px; border-radius: 20px; background: var(--green); color: #fff; margin: 4px 6px 0 0; }
  .qz-lead2 { font-family: var(--mono); font-size: .6rem; letter-spacing: .13em; text-transform: uppercase; color: var(--sage-d); margin: 18px 0 10px; }
  .qz-missrow { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 13px 15px; margin-bottom: 10px; }
  .qz-missq { font-family: var(--serif); font-size: .98rem; font-weight: 600; color: var(--forest); margin-bottom: 6px; }
  .qz-missa { font-size: .88rem; color: var(--ink-soft); }
  .qz-missa b { color: var(--green-d); }

  .qz-confetti { position: absolute; inset: 0; pointer-events: none; overflow: visible; }
  .qz-confetti span { position: absolute; top: 0; left: calc(10% + (var(--i) * 9%)); width: 7px; height: 7px; border-radius: 2px; background: var(--green); animation: confetti-fall 1.1s ease-out forwards; animation-delay: calc(var(--i) * 0.05s); }
  .qz-confetti span:nth-child(3n) { background: var(--sage); }
  .qz-confetti span:nth-child(3n+1) { background: var(--sky-line); }
  @keyframes confetti-fall { from { transform: translateY(-10px) rotate(0deg); opacity: 1; } to { transform: translateY(70px) rotate(200deg); opacity: 0; } }

  :focus-visible { outline: 2px solid var(--green); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } .qz-confetti { display: none; } }
  @media (min-width: 760px) { .screen-inner { max-width: 680px; } }
</style>

    quiz:{ q:"A Canopy Conversation is:", choices:["A structured Socratic seminar in every subject, grades 6\u201312", "A once-a-year all-school assembly", "An optional after-school debate club"], answer:"A structured Socratic seminar in every subject, grades 6\u201312", explain:"It's a practiced skill built over seven years \u2014 guided participation in middle school, fully student-led discourse by 12th grade \u2014 validated by a site visit to Washington Latin." } },
  { d:"MODEL", owners:["pettey"], q:"Describe the Grove Journey and June Term. Is June Term instructional time or enrichment?",
    points:["Seven-year arc; each grade has a theme, an outdoor environment, and a community partner, moving from local experiences in 6th toward internships and independent launch by 12th.","June Term is 2–3 weeks at the end of each year — internships, expeditions, financial literacy, college navigation. It's applied core learning, not enrichment: 'the internship is a job.'","Culminates in a capstone narrative defended before a panel including a community/professional member."],
    cite:"Prompt 2.2 — Grove Journey / June Term; Design Pillar 4",
    quiz:{ q:"June Term is best described as:", choices:["2\u20133 weeks of applied core learning \u2014 internships, expeditions, financial literacy", "An optional summer enrichment camp, not core learning", "A single field trip at year's end"], answer:"2\u20133 weeks of applied core learning \u2014 internships, expeditions, financial literacy", explain:"\"The internship is a job\" \u2014 June Term is applied core learning, not enrichment, and culminates in a capstone defended before a panel." } },
  { d:"MODEL", owners:["dunn","pettey"], q:"What curriculum are you using, and how will you guarantee alignment to Washington standards?",
    points:["College-prep sequence with AP access for all and College in the High School; a curriculum crosswalk mapping every unit to WA EALRs/GLEs is committed by <b>December 2026</b>.","Annual principal-led curriculum audit against OSPI guidance; Mike Dunn (WSU, 15-yr ESD 101 superintendent) is the standing standards-alignment resource.","External verification via SBAC, PSAT/SAT, and interim assessments; full engagement with WISF."],
    cite:"Prompt 2.2 — Curriculum Alignment",
    quiz:{ q:"By when is the curriculum crosswalk to WA EALRs/GLEs committed?", choices:["December 2026", "June 2027", "December 2025"], answer:"December 2026", explain:"The crosswalk mapping every unit to WA standards is committed by December 2026, backed by an annual principal-led curriculum audit." } },
  { d:"MODEL", owners:["pettey"], q:"You lean heavily on AI literacy. What does that mean concretely for a 6–12 school?",
    points:["AI literacy is taught as an explicit competency alongside note-taking and self-advocacy: students use AI as a thinking partner, evaluate its output, and understand its ethical limits.","Framed as future-readiness — the judgment employers and colleges will expect from day one."],
    cite:"Prompt 2.2 — AI Literacy and Future-Ready Skills",
    quiz:{ q:"How is AI literacy taught at Cedar Grove?", choices:["As an explicit competency, like note-taking or self-advocacy", "As a stand-alone elective, high school only", "It isn't part of the curriculum"], answer:"As an explicit competency, like note-taking or self-advocacy", explain:"Students use AI as a thinking partner, evaluate its output, and learn its ethical limits \u2014 framed as future-readiness employers and colleges will expect." } },

  { d:"OUTCOMES", core:true, owners:["pettey","wright"], q:"What are your Year-5 outcome goals, and how will the commission know if you're succeeding?",
    points:["Five goal areas mirroring the mission. Headline Yr-5 targets: SBAC meet/exceed state avg with closing subgroup gaps; 80% meet SAT/ACT benchmarks; 90%+ retention; 95% complete ≥1 capstone/internship; 100% accepted to ≥1 two/four-year institution; grad rate ≥ state (~85%); 80%+ enroll postsecondary within a year; 70%+ persist to year two.","<b>Every target disaggregated</b> by race, income, IEP/504, and EL — the school is 'not successful if any subgroup is systematically excluded.'"],
    cite:"Prompt 2.3 Outcomes — goal table",
    quiz:{ q:"What's the Year-5 target for students meeting SAT/ACT benchmarks?", choices:["80%", "60%", "95%"], answer:"80%", explain:"80%+ meeting SAT/ACT benchmarks by Year 5 \u2014 and every target is disaggregated by race, income, IEP/504, and EL status." } },
  { d:"OUTCOMES", owners:["wright","pettey"], q:"How do you measure 'belonging' without hand-waving? It's easy to claim, hard to prove.",
    points:["Belonging is operationalized as measurable systems, not aspirational language — 90%+ annual retention with exit interviews for every departing student, plus bi-annual climate surveys reported publicly with action plans within 30 days.","Dr. Wright's role is specifically to ensure 'belonging, joy, and agency' is tracked through measurable systems and ongoing evaluation."],
    cite:"Prompt 2.3; Dr. Wright bio",
    quiz:{ q:"How is 'belonging' measured, concretely?", choices:["90%+ retention with exit interviews, plus public bi-annual climate surveys", "A single end-of-year satisfaction survey", "It isn't formally measured"], answer:"90%+ retention with exit interviews, plus public bi-annual climate surveys", explain:"Belonging is tracked as a measurable system \u2014 climate survey results are reported publicly with action plans within 30 days." } },
  { d:"OUTCOMES", owners:["wiegner","pettey"], q:"When the school misses a target, what actually happens at the board level?",
    points:["CEO reports on a defined cycle: monthly academic dashboard, bi-annual climate results, annual performance report.","Board receives a formal annual report tied to the charter performance framework, disaggregated, with year-over-year trends from Year 2; the Academic Achievement Committee reviews meeting/approaching/falling-short status and the board holds the CEO to action plans when targets are missed.","Local precedent: Lumen's mission-specific Academic Performance Framework negotiated with SPS, renewed with no conditions."],
    cite:"Prompt 2.3 — Board Accountability",
    quiz:{ q:"Which board committee reviews meeting/approaching/falling-short status on outcomes?", choices:["Academic Achievement Committee", "Finance Committee", "Governance Committee"], answer:"Academic Achievement Committee", explain:"The Academic Achievement Committee reviews outcome status and the board holds the CEO to action plans when targets are missed." } },

  { d:"STUDENTS", owners:["dunn","pettey"], q:"What percent of students do you project as SWD and multilingual, and how are you staffed to serve them?",
    points:["At full enrollment: ~14% students with disabilities, ~13% multilingual learners — intentionally above the SPS ML baseline (~7–8%) because of targeted outreach.","'Inclusion by design': MTSS + co-teaching/push-in in gen-ed, UDL from the outset, LRE default placement in the general classroom.","SpEd related services (psych, speech, OT/PT) contracted through ESD 101, scaling with enrollment; in-house specialists added as the school grows."],
    cite:"Prompt 2.2 — Serving Students with Disabilities and ML",
    quiz:{ q:"At full enrollment, what share of students are projected to be multilingual learners?", choices:["~13%", "~7\u20138%", "~25%"], answer:"~13%", explain:"~13% ML is intentionally above the SPS baseline (~7\u20138%) because of targeted outreach \u2014 paired with ~14% students with disabilities." } },
  { d:"STUDENTS", owners:["dunn"], q:"If SWD enrollment comes in higher than projected in Year 1, what's your plan?",
    points:["Increase ESD 101 contracted services, adjust co-teaching ratios, and direct additional SpEd funding to expanded capacity.","If lower than projected, the inclusive structures (UDL, MTSS) stay — they benefit all learners regardless of subgroup size."],
    cite:"Prompt 2.2 — Evaluation of Effectiveness and Adaptation",
    quiz:{ q:"If SWD enrollment comes in higher than projected in Year 1, what happens?", choices:["Increase ESD 101 contracted services and adjust co-teaching ratios", "Cap enrollment for students with disabilities", "Refer those students to other district schools"], answer:"Increase ESD 101 contracted services and adjust co-teaching ratios", explain:"Additional SpEd funding follows the need; if enrollment is lower than projected, the inclusive structures (UDL, MTSS) stay in place regardless." } },
  { d:"STUDENTS", owners:["pettey","wright"], q:"'College-prep by default, no tracking' sounds good — but how does a struggling 6th grader actually access rigor?",
    points:["Support is layered onto the same rigorous curriculum, never a separate lower track: embedded intervention blocks in the master schedule (a structural commitment, not an afterthought), co-teaching, and UDL.","Modeled on the Uncommon Schools site visit — intervention as design, not a sign of failure. 'What differs across learners is not the expectation but the level of support.'"],
    cite:"Prompt 2.2 — Design Pillar 1; Uncommon site visit",
    quiz:{ q:"How does a struggling 6th grader access rigor?", choices:["Support is layered onto the same curriculum via embedded intervention blocks", "They're placed in a separate remedial track", "They repeat the grade"], answer:"Support is layered onto the same curriculum via embedded intervention blocks", explain:"\"What differs across learners is not the expectation but the level of support\" \u2014 modeled on the Uncommon Schools site visit." } },

  { d:"GOV", core:true, owners:["wiegner"], q:"Describe the division of authority between the board and the CEO.",
    points:["The board governs; the CEO and staff manage. Board approves/monitors the strategic plan and budget, hires/evaluates/replaces the CEO, adopts policy, monitors outcomes against authorizer goals, and safeguards financial sustainability.","The CEO executes the academic program and operations, and hires/supervises/terminates all staff. The CEO is a <b>non-voting</b> participant at board meetings."],
    cite:"Prompt 3.1 — Board of Directors; Division of Responsibilities",
    quiz:{ q:"Is the CEO a voting member of the board?", choices:["No \u2014 non-voting", "Yes, full voting rights", "Only on academic matters"], answer:"No \u2014 non-voting", explain:"The board governs and the CEO manages: the CEO executes the program and hires/supervises staff, but sits as a non-voting participant." } },
  { d:"GOV", owners:["wiegner"], q:"What's your board composition, term structure, and committee model?",
    points:["7–11 members recruited via a skills-and-values matrix (education, finance, legal, HR, philanthropy, facilities, equity, community), with staggered 3-year terms and intentional representation from first-gen graduates and communities of color.","Officers: Chair (Wiegner), Vice Chair, Secretary (Wright), Treasurer (Franklin). Four standing committees: Governance, Academic Achievement, Finance, Development (which drives 100% board giving)."],
    cite:"Prompt 3.1 — Composition and Officers; Board Committees",
    quiz:{ q:"How many members is the board designed to have?", choices:["7\u201311", "3\u20135", "15\u201320"], answer:"7\u201311", explain:"7\u201311 members recruited via a skills-and-values matrix, staggered 3-year terms, with four standing committees: Governance, Academic Achievement, Finance, Development." } },
  { d:"GOV", owners:["wiegner","franklin"], q:"Your board isn't fully seated. Isn't that a capacity risk?",
    points:["Named seated board: Pettey (CEO, non-voting), Wiegner (Chair), Franklin (Treasurer), Wright (Secretary), Dunn (Member).","Acknowledged gaps with a concrete plan: recruiting finance, legal, and facilities/real-estate expertise; target full board seated by Fall 2026; partnering with Jen Wickens/Seminar to source Spokane candidates.","Frame it as disciplined sequencing, not a hole — recruiting to a matrix rather than filling seats fast."],
    coach:"Be ready to name exactly which seats are still open and your recruiting timeline — a not-yet-full board is a predictable pressure point.",
    cite:"Prompt 1.2 — Gap Closure Strategy; 3.1 Composition",
    quiz:{ q:"What's the target date for a fully seated board?", choices:["Fall 2026", "Fall 2027", "Fall 2025"], answer:"Fall 2026", explain:"Gaps (finance, legal, facilities/real-estate expertise) are being recruited to a matrix on a disciplined timeline, not filled fast \u2014 full board seated by Fall 2026." } },
  { d:"GOV", owners:["wiegner"], q:"How does the board hold itself accountable, not just the CEO?",
    points:["Annual summer retreat to set goals and committee workplans; a board KPI dashboard reviewed at every meeting; a structured annual CEO evaluation run by the Governance Committee; and an annual board self-assessment with a written improvement plan."],
    cite:"Prompt 3.1 — Board Accountability",
    quiz:{ q:"How does the board hold itself (not just the CEO) accountable?", choices:["Annual retreat, board KPI dashboard, structured CEO evaluation, and self-assessment", "Quarterly public elections for board seats", "An external state audit every year"], answer:"Annual retreat, board KPI dashboard, structured CEO evaluation, and self-assessment", explain:"The Governance Committee runs a structured annual CEO evaluation, and the board completes its own self-assessment with a written improvement plan." } },

  { d:"COI", core:true, owners:["franklin","wiegner"], q:"Several of your board members are tied to ESWA, which is also your incubation partner. Walk us through those conflicts.",
    points:["Disclosed and managed, not hidden. Wiegner (ESWA Executive in Residence) and Franklin (ESWA co-founder) both <b>recuse from any ESWA contract, programming, or funding vote</b>; all recusals documented in minutes.","Dunn recuses from ESD 101 service-agreement votes (former superintendent there; ESD 101 is a service provider).","The board actively recruits members with no ties to current members or ESWA to protect independence."],
    cite:"Prompt 3.3 — Identified Relationships table",
    quiz:{ q:"Which two board members recuse from ESWA contract/funding votes?", choices:["Wiegner and Franklin", "Wright and Dunn", "Pettey and Dunn"], answer:"Wiegner and Franklin", explain:"Wiegner (ESWA Executive in Residence) and Franklin (ESWA co-founder) recuse from all ESWA votes; Dunn separately recuses from ESD 101 votes." } },
  { d:"COI", owners:["franklin"], q:"Mr. Franklin, you're a Gates Foundation program officer and the school may seek Gates-aligned funding. How is that not a conflict?",
    points:["Answer this one directly and without defensiveness: 'I do not make Gates grant decisions for Cedar Grove. I recuse from any board vote involving Gates-connected funding or ESWA contracts, and it's disclosed annually in the minutes and the conflict-of-interest log.'","Reinforce that the mitigation is structural — a signed annual COI policy, mandatory disclosure at the start of any related discussion, leaving the room, and recusal from the vote."],
    coach:"This is the question most likely aimed at you personally. Rehearse it until it's calm and short — over-explaining reads as discomfort.",
    cite:"Prompt 3.3 — Franklin row; COI Policy",
    quiz:{ q:"What does Franklin say about his role with Gates Foundation funding?", choices:["He recuses from any related board vote and doesn't make Gates grant decisions for Cedar Grove", "He personally approves all Gates grants to Cedar Grove", "He resigned from the Gates Foundation to avoid the conflict"], answer:"He recuses from any related board vote and doesn't make Gates grant decisions for Cedar Grove", explain:"The mitigation is structural: disclosure at the start of discussion, leaving the room, and recusal from the vote \u2014 documented annually in the minutes and COI log." } },
  { d:"COI", owners:["franklin","wiegner"], q:"What is your actual conflict-of-interest process — mechanically?",
    points:["All board members and the CEO sign a written COI policy annually (aligned to WA nonprofit law and IRS Form 990).","Policy covers both actual and perceived conflicts; anyone with either must disclose at the start of the discussion, leave during deliberation, and be recused from the vote.","Secretary records disclosures, recusals, and votes; the Chair maintains a running conflict log reviewed annually and available to the authorizer on request."],
    cite:"Prompt 3.3 — Governance Structures to Prevent Conflicts",
    quiz:{ q:"Who signs the written COI policy annually?", choices:["All board members and the CEO", "Only the Board Chair", "Only newly recruited board members"], answer:"All board members and the CEO", explain:"Everyone signs annually, aligned to WA nonprofit law and IRS Form 990; the Secretary records disclosures/recusals and the Chair maintains a conflict log." } },
  { d:"COI", owners:["franklin"], q:"Any contract with a board-connected organization — what stops that from being a sweetheart deal?",
    points:["Competitive review, full-board approval with the interested party recused, and documentation in minutes.","No sole-source contract above the $40,000 threshold (RCW 28A.335.190) without board approval and documented justification; board-connected vendors (ESWA, Elevating Educators LLC, ESD 101) reviewed annually for necessity, value, and arm's-length terms."],
    cite:"Prompt 3.3 — Procurement; 3.4 contracting",
    quiz:{ q:"What contract value triggers the RCW 28A.335.190 sole-source board-approval threshold?", choices:["$40,000", "$10,000", "$100,000"], answer:"$40,000", explain:"Above $40,000, sole-source contracts need board approval and documented justification; board-connected vendors get an annual arm's-length review." } },

  { d:"FIN", core:true, owners:["franklin"], q:"Give us the shape of your five-year budget — revenue drivers and scale.",
    points:["Opens Fall 2027 with 230 students (grades 6 & 9), scaling to 780 (6–12) by Year 5 / FY2032. Revenue grows from ~$4.5M in Year 1 to ~$13.9M at full scale, driven by the grade-by-grade build-out.","State/local funding is primary: BEA ~$13,357/pupil in Year 1 (WA small-schools premium), normalizing as enrollment grows; 2.5% annual revenue escalator.","Federal: CSP grants $400K/yr and IDEA starting $132,921 in Year 1; Title I/II/III per pupil at +1.5%."],
    cite:"Prompt 3.4 — Revenue Overview",
    quiz:{ q:"What is Cedar Grove's projected revenue at full scale (Year 5)?", choices:["~$13.9M", "~$4.5M", "~$25M"], answer:"~$13.9M", explain:"Revenue grows from ~$4.5M in Year 1 to ~$13.9M at full scale (780 students), driven by the grade-by-grade build-out." } },
  { d:"FIN", owners:["franklin"], q:"How is the school solvent if a philanthropic grant doesn't come through?",
    points:["Philanthropy is treated as <b>non-recurring, non-operating</b> revenue: $300K Yr1, $600K Yr2–4, $300K Yr5.","Recurring state + federal revenue already covers ~95% of expenses in Year 1; philanthropy provides the remaining coverage plus a buffer, and the model shows an operating surplus every year (~$58K Yr1, $279K Yr3, $349K Yr4).","Don't overstate — recurring revenue alone doesn't fully cover Year 1; the ~5% gap plus buffer is what philanthropy fills. Say that plainly."],
    cite:"Prompt 3.4 — Revenue / Expenditure Overview",
    quiz:{ q:"What share of Year 1 expenses does recurring state + federal revenue already cover?", choices:["~95%", "~60%", "100%"], answer:"~95%", explain:"Recurring revenue alone doesn't fully cover Year 1 \u2014 philanthropy (treated as non-recurring) fills the remaining ~5% gap plus a buffer." } },
  { d:"FIN", core:true, owners:["franklin"], q:"What is your days-cash-on-hand across the projection, and how does it compare to the Commission's threshold?",
    points:["Above the Commission's Stage 2 threshold of 60 days in every year — ranging from 63 days at the lowest (Year 3) to 108 days (Year 1), strengthening to 75 by Year 5.","Enters Year 1 with $1.25M starting cash (~97 days of operating expenses before a single student enrolls).","Board reserve policy: minimum 30 days of operating expenses at all times."],
    cite:"Prompt 3.4 — Financial Resilience",
    quiz:{ q:"Cedar Grove's days-cash-on-hand stays above the Commission's Stage 2 threshold of:", choices:["60 days, every year (63\u2013108 days)", "30 days, but dips below it in Year 3", "90 days, falling short in Year 2"], answer:"60 days, every year (63\u2013108 days)", explain:"Year 1 opens with $1.25M starting cash (~97 days) before a single student enrolls; board reserve policy floors at 30 days minimum." } },
  { d:"FIN", owners:["franklin"], q:"Enrollment is your biggest revenue risk. What happens if you under-enroll in Year 1?",
    points:["The $1.25M starting cash (~97 days) is the first buffer against a slow ramp.","Levers if enrollment falls short: additional fundraising, staffing reductions, or expenditure cuts — decided by leadership; unanticipated costs are absorbed by reserves before any programmatic cut.","Staffing scales <i>with</i> enrollment (teachers added by MS/HS student counts), so costs partially self-adjust."],
    cite:"Prompt 3.4 — Contingency Planning; 3.1 staffing",
    quiz:{ q:"What's the first buffer against a slow Year 1 enrollment ramp?", choices:["The $1.25M starting cash (~97 days of operating expenses)", "An emergency loan from the school district", "Immediate staff layoffs"], answer:"The $1.25M starting cash (~97 days of operating expenses)", explain:"Staffing also scales with enrollment, so costs partially self-adjust before any programmatic cut is considered." } },
  { d:"FIN", owners:["franklin"], q:"What's your largest cost, and how do you keep it disciplined?",
    points:["Personnel — ~53% of expenses in Year 1 rising to ~59% at full scale; ~24 FTE growing to ~69 at maturity. Salaries +3%/yr, benefits at 30% of salary.","Staffing is enrollment-driven, not ahead of it: student-teacher ~21:1 (23:1 MS, 18:1 HS). Facilities ~$408K/yr all-in; a $5.175M 30-year loan at 5% (~$333K annual debt service).","The Commission's 3%-of-revenue oversight fee is built into contracted services."],
    cite:"Prompt 3.4 — Expenditure Overview; 3.1 Staffing Model",
    quiz:{ q:"What is Cedar Grove's largest expense category?", choices:["Personnel (~53% of expenses in Year 1, rising to ~59%)", "Facilities", "Technology"], answer:"Personnel (~53% of expenses in Year 1, rising to ~59%)", explain:"Staffing is enrollment-driven, not ahead of it \u2014 student-teacher ratio ~21:1, growing from ~24 FTE to ~69 at maturity." } },
  { d:"FIN", owners:["franklin"], q:"Who manages the money day-to-day, and what are your controls and audit plan?",
    points:["Year 1: COO handles day-to-day finance, supported by a part-time CFO/Finance Manager (0.3 FTE) with charter/WA reporting expertise; payroll is outsourced for separation of duties.","Cloud accounting aligned to OSPI's WSIPC chart of accounts from day one; annual independent CPA audit (K–12 experience, competitively selected), full engagement from Year 2 (~$30K/yr), results to the full board.","Contracts above $40,000 (RCW 28A.335.190) require ≥3 qualified proposals scored on experience, WA familiarity, references, and cost."],
    cite:"Prompt 3.4 — Financial Policies / Fiscal Staffing",
    quiz:{ q:"Who handles day-to-day finance in Year 1?", choices:["The COO, supported by a part-time CFO/Finance Manager (0.3 FTE)", "A full-time in-house CFO from day one", "The Board Treasurer, personally"], answer:"The COO, supported by a part-time CFO/Finance Manager (0.3 FTE)", explain:"Payroll is outsourced for separation of duties, and an independent CPA audit begins full engagement from Year 2 (~$30K/yr)." } },

  { d:"ENROLL", core:true, owners:["pettey"], q:"Why should we believe you can fill 230 seats in Year 1?",
    points:["Year 1 target (140 sixth-graders, 90 ninth-graders) is ~3% and ~2% of Spokane's annual cohorts (~4,200 6th, ~4,483 9th); full capacity of 780 is ~1.3% of the regional 6–12 market.","Documented demand: 90 completed surveys, 50+ signed supporter cards, 15+ stakeholder meetings, 35–40+ Design Team participants.","Independent corroboration via Education Data Collective — 32,000+ school-age children in the draw area; charter enrollment up 65% in 99207 since 2019."],
    cite:"Prompt 1.1 / 2.4 — demand evidence; Independent Evidence",
    quiz:{ q:"What is the Year 1 enrollment target?", choices:["230 students (140 sixth-graders + 90 ninth-graders)", "300 students (150 sixth + 150 ninth)", "150 students, sixth grade only"], answer:"230 students (140 sixth-graders + 90 ninth-graders)", explain:"That's only ~3% and ~2% of Spokane's annual 6th/9th cohorts \u2014 full capacity of 780 is ~1.3% of the regional 6\u201312 market." } },
  { d:"ENROLL", owners:["pettey"], q:"What's the recruitment plan and who's running it? Enrollment is where charters fail.",
    points:["Direct outreach to 8th-grade families, trusted-partner channels (Boys & Girls Club, Communities in Schools, YMCA, AIER, Unity in the Community), a Family Ambassador model, and multilingual materials.","Enrollment consultant Vanessa Barry (Mariposa) — an ESWA-portfolio specialist in charter enrollment via social, events, and earned media — works directly with Melissa on the launch plan.","Open lottery compliant with WA charter law; recruitment tracked by ZIP, feeder school, and first-gen status."],
    cite:"Prompt 2.4 Enrollment Strategy; 3.2 Marketing & Recruitment",
    quiz:{ q:"Who is Cedar Grove's enrollment consultant?", choices:["Vanessa Barry (Mariposa)", "Jen Wickens (Seminar)", "The CEO, working alone"], answer:"Vanessa Barry (Mariposa)", explain:"Vanessa Barry is an ESWA-portfolio specialist in charter enrollment via social, events, and earned media, working directly with the CEO on the launch plan." } },

  { d:"FACILITY", core:true, owners:["pettey"], q:"You don't have a signed facility. What's the status and the backup?",
    points:["Active search on multiple fronts. Lead near-term option: co-location with Innovation Public Schools (811 E. Sprague) — the owner (Growler Co.) and Innovation's ED and Board Chair have confirmed a co-location would be welcomed (letter of support, Attachment 11).","Three additional sites identified via 4 Degrees Real Estate (the firm that sited Lumen); two downtown near the bus plaza, one near Innovation.","Goal: evaluate 2–4 options by Spring 2027 and secure a lease/MOU before opening. Long-term preference is to own, exploring Opportunity Zone / New Market Tax Credit financing."],
    coach:"Facilities lead is currently Melissa; a board member with real-estate expertise is still being recruited. Be ready to say who takes primary ownership and when.",
    cite:"Prompt 2.4 — Facilities Needs and Current Status",
    quiz:{ q:"What is the lead near-term facility option?", choices:["Co-location with Innovation Public Schools (811 E. Sprague)", "A signed long-term lease downtown near the bus plaza", "Purchasing a former church building"], answer:"Co-location with Innovation Public Schools (811 E. Sprague)", explain:"The owner and Innovation's ED/Board Chair have confirmed support in writing; three more sites are identified via 4 Degrees Real Estate as backups." } },
  { d:"FACILITY", owners:["pettey"], q:"What are your actual space requirements, Year 1 and at build-out?",
    points:["Year 1: ~24,000–26,000 sq ft — 10 classrooms, 2 SpEd/intervention rooms, gym/multipurpose, wellness room, counseling/college center, offices. Science labs added from Year 2.","Space scales with the grade build-out toward full enrollment of 780, adding science labs, expanded intervention space, and a full gym."],
    cite:"Prompt 2.4 — Space Requirements",
    quiz:{ q:"What is the approximate Year 1 space requirement?", choices:["~24,000\u201326,000 sq ft", "~10,000 sq ft", "~50,000 sq ft"], answer:"~24,000\u201326,000 sq ft", explain:"10 classrooms, 2 SpEd/intervention rooms, gym/multipurpose, wellness room, counseling/college center \u2014 science labs are added from Year 2." } },

  { d:"COMMUNITY", owners:["pettey","wright"], q:"Show us this was built WITH the community, not just marketed to it.",
    points:["Engagement prioritized listening before designing: 15+ formal stakeholder meetings, two Design Team phases (35–40+ participants), 10+ community events, 90 surveys, 50+ supporter cards.","Concrete design changes from feedback — expanding to include middle school, and elevating belonging/joy/athletics as core elements after families named them.","Partners: Carl Maxey Center, Communities in Schools, New Developed Nations, Seattle U PEBCI, plus higher-ed guidance from EWU and Seattle U."],
    cite:"Prompt 1.1 — Stakeholder Engagement",
    quiz:{ q:"What concrete change resulted from community feedback?", choices:["Expanding to include middle school and elevating belonging/joy/athletics", "Removing the June Term program", "Shortening the school day"], answer:"Expanding to include middle school and elevating belonging/joy/athletics", explain:"That came out of 15+ stakeholder meetings, two Design Team phases, and 90 completed surveys \u2014 listening before designing." } },
  { d:"COMMUNITY", owners:["wright"], q:"How do you keep community engagement from becoming performative once you're authorized?",
    points:["Design Team 2.0 continues through opening; closing the feedback loop (telling families how their input changed decisions) is an explicit commitment.","Dr. Wright — whose expertise is anti-oppressive pedagogy and belonging — guides the co-creation process specifically to keep it substantive rather than performative.","Ongoing structures: annual climate surveys with public results and 30-day action plans, a student advisory council, and an annual plain-language community report card."],
    cite:"Prompt 3.2 — Gathering and Using Input",
    quiz:{ q:"Who guides community co-creation to keep it substantive rather than performative?", choices:["Dr. Wright", "Melissa Pettey", "An outside consulting firm"], answer:"Dr. Wright", explain:"Her expertise is anti-oppressive pedagogy and belonging; closing the feedback loop with families is an explicit, ongoing commitment through Design Team 2.0." } },

  { d:"RISK", core:true, owners:["pettey","wiegner"], q:"What's the single biggest risk to opening, and how are you managing it?",
    points:["Naming it plainly: disrupting Spokane's neighborhood-school norm — choosing a new public option feels unfamiliar and risky to families.","Evidence the ground is shifting: private enrollment up 25.8%; SPS down ~1,800 students (~6%) since 2021. Strategy targets families already making active choices and builds through trusted networks.","Secondary risks — facility and educator recruitment — have concrete mitigation (multiple sites, mission-aligned hiring, ESWA incubation support)."],
    cite:"1.1 Coalition Challenges; NOI Anticipated Challenges",
    quiz:{ q:"What's named as the single biggest risk to opening?", choices:["Disrupting Spokane's neighborhood-school norm \u2014 a new option feels unfamiliar", "Running out of philanthropic funding in Year 1", "Failing the SBAC in Year 1"], answer:"Disrupting Spokane's neighborhood-school norm \u2014 a new option feels unfamiliar", explain:"The strategy targets families already making active choices \u2014 private enrollment is up 25.8% while SPS is down ~6% since 2021." } },
  { d:"RISK", owners:["pettey","dunn"], q:"Educator recruitment is brutal right now. How do you staff a brand-new school?",
    points:["Mission-aligned hiring against published rubrics, ongoing professional learning, and systems built for collaboration and retention.","Talent depth on the board: Wiegner built human-capital systems at DSST and launched campuses at Uncommon; job descriptions and a talent strategy are already developed.","Summer camps and a Year-1 founding-team hiring timeline (all roles posted by 12/1/2026, founding staff hired by Feb 2027)."],
    cite:"1.2 team; 3.2 milestones",
    quiz:{ q:"By when are all founding roles targeted to be posted?", choices:["12/1/2026", "6/1/2026", "12/1/2027"], answer:"12/1/2026", explain:"Founding staff are targeted to be hired by Feb 2027, backed by mission-aligned hiring rubrics and board talent depth (Wiegner built human-capital systems at DSST/Uncommon)." } }
];

/* ================= Persistence ================= */
let mem = {};
const store = {
  get(k){ try { const v = localStorage.getItem(k); return v===null ? mem[k] : v; } catch(e){ return mem[k]; } },
  set(k,v){ try { localStorage.setItem(k,v); } catch(e){ mem[k]=v; } },
  del(k){ try { localStorage.removeItem(k); } catch(e){} delete mem[k]; }
};
const rKey = i => "cg_rate_"+i;

/* ================= State ================= */
let seat = store.get("cg_seat") || null;
let state = { tab: seat ? "prep" : "seat", topic: null, scope: seat ? "mine" : "all", pickSeat: false, quizScreen: "setup" };
let quizState = { scope: seat ? "mine" : "all", sections: [], length: 10, session: null };

/* ================= Helpers ================= */
const EMBLEM = `<svg class="aemblem" viewBox="0 0 120 100" aria-hidden="true">
  <path d="M16,72 C33,66 52,68 60,76 L60,84 C52,76 33,74 16,78 Z" fill="#C6DAE2"/>
  <path d="M104,72 C87,66 68,68 60,76 L60,84 C68,76 87,74 104,78 Z" fill="#C6DAE2"/>
  <g fill="#9CBB8A">
    <g transform="translate(31,28) scale(0.7)"><polygon points="0,0 8,16 4,16 13,32 7,32 19,50 -19,50 -7,32 -13,32 -4,16 -8,16"/><rect x="-2.5" y="48" width="5" height="13"/></g>
    <g transform="translate(89,28) scale(0.7)"><polygon points="0,0 8,16 4,16 13,32 7,32 19,50 -19,50 -7,32 -13,32 -4,16 -8,16"/><rect x="-2.5" y="48" width="5" height="13"/></g>
    <g transform="translate(60,10)"><polygon points="0,0 8,16 4,16 13,32 7,32 19,50 -19,50 -7,32 -13,32 -4,16 -8,16"/><rect x="-2.5" y="48" width="5" height="16"/></g>
  </g></svg>`;

function inScope(item){
  if (state.scope === "all" || !seat) return true;
  return item.owners.includes(seat) || item.core;
}
function scoped(){ return Q.map((item,idx)=>({item,idx})).filter(o=>inScope(o.item)); }
function byDomain(list){ const g={}; list.forEach(o=>(g[o.item.d]=g[o.item.d]||[]).push(o)); return g; }
function counts(list){ let s=0; list.forEach(o=>{ if(store.get(rKey(o.idx))==="solid") s++; }); return {solid:s,total:list.length}; }

function ring(frac, size){
  const r=(size-5)/2, c=2*Math.PI*r, off=c*(1-frac);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--line)" stroke-width="4"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--green)" stroke-width="4" stroke-linecap="round"
      stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 ${size/2} ${size/2})"/>
  </svg>`;
}
function ownerChips(owners){
  return owners.filter(o=>o!=="all").map((o,i)=>`<span class="chip${i===0?' lead':''}">${MEMBERS[o].short}</span>`).join("");
}
function cardHTML(item, idx, n, code){
  const rating = store.get(rKey(idx)) || "";
  const allChip = item.core ? `<span class="chip all">All</span>` : "";
  return `<div class="card${rating==="solid"?" solid":""}" data-idx="${idx}">
    <div class="card-top" role="button" tabindex="0" aria-expanded="false">
      <div class="qcode">${code}·${String(n).padStart(2,"0")}</div>
      <div class="qmain">
        <div class="qtext">${item.q}</div>
        <div class="owners">${allChip}${ownerChips(item.owners)}</div>
        <div class="hint"><span class="chev">▸</span> Tap to reveal talking points</div>
      </div>
    </div>
    <div class="answer">
      <div class="div"></div>
      <h4>Talking points — from the submitted application</h4>
      <ul>${item.points.map(p=>`<li>${p}</li>`).join("")}</ul>
      ${item.coach?`<div class="coach"><b>Coach's note:</b> ${item.coach}</div>`:``}
      <div class="cite">Source · ${item.cite}</div>
      <div class="rate">
        <span>Readiness</span>
        <button data-r="notyet"${rating==="notyet"?' class="on"':''}>Not yet</button>
        <button data-r="getting"${rating==="getting"?' class="on"':''}>Getting there</button>
        <button data-r="solid"${rating==="solid"?' class="on ok"':''}>Solid</button>
      </div>
    </div></div>`;
}

/* ================= Screens ================= */
function screenPrepList(){
  const groups = byDomain(scoped());
  const keys = Object.keys(DOMAINS).filter(k=>groups[k] && groups[k].length);
  const seg = seat ? `<div class="seg">
      <button data-scope="mine" class="${state.scope==='mine'?'on':''}">My questions</button>
      <button data-scope="all" class="${state.scope==='all'?'on':''}">All topics</button>
    </div>` : ``;
  const intro = seat
    ? `<p class="lead">Showing ${state.scope==='mine'?`what <b>${MEMBERS[seat].short}</b> owns, plus shared essentials`:`all topics`}. Tap a topic to drill in.</p>`
    : `<p class="lead">Pick your seat in <b>My Seat</b> to focus on what you own — or browse every topic here.</p>`;
  const rows = keys.map(k=>{
    const c = counts(groups[k]); const frac = c.total ? c.solid/c.total : 0;
    return `<button class="trow" data-topic="${k}">
      <div class="ringwrap">${ring(frac,34)}<div class="rc">${c.solid}/${c.total}</div></div>
      <div class="tmid"><div class="tn">${DOMAINS[k].name}</div><div class="tsub">${DOMAINS[k].lens} lens · ${c.total} question${c.total!==1?'s':''}</div></div>
      <div class="chev">›</div>
    </button>`;
  }).join("");
  return `<p class="eyebrow">Prepare</p>${seg}${intro}${rows || `<p class="lead">No questions for this filter.</p>`}`;
}

function screenTopic(k){
  const list = byDomain(scoped())[k] || [];
  const body = list.map((o,i)=>cardHTML(o.item,o.idx,i+1,DOMAINS[k].code)).join("");
  return `<p class="eyebrow">${DOMAINS[k].lens} lens</p><p class="lead">${list.length} question${list.length!==1?'s':''} — answer each out loud before revealing the talking points, then mark your readiness.</p>${body}`;
}

function screenSeat(){
  if (!seat || state.pickSeat){
    const opts = ORDER.map(id=>`<button class="roleopt${seat===id?' sel':''}" data-seat="${id}">
      <div class="n">${MEMBERS[id].name}</div><div class="r">${MEMBERS[id].role.split(" ·")[0]}</div></button>`).join("");
    return `<p class="eyebrow">My Seat</p><p class="lead">Which seat are you? This focuses your prep on what you'll be asked to own.</p>${opts}
      ${seat?`<button class="btn ghost" data-act="cancelpick">Keep ${MEMBERS[seat].short}</button>`:``}`;
  }
  const m = MEMBERS[seat];
  const mine = Q.map((item,idx)=>({item,idx})).filter(o=>o.item.owners.includes(seat) || o.item.core);
  const c = counts(mine); const frac = c.total ? c.solid/c.total : 0;
  const coi = m.coi ? `<div class="coi"><b>⚑ Conflict to manage:</b> ${m.coi}</div>` : "";
  return `<p class="eyebrow">My Seat</p>
    <div class="seatcard">
      <div class="nm">${m.name}</div><div class="rl">${m.role}</div>
      <div class="ow"><b>What you own:</b> ${m.owns}</div>
      ${coi}
      <div class="readbar"><div class="rl2">Your readiness — <b>${c.solid} of ${c.total}</b> of your questions marked solid</div>
        <div class="track"><i style="width:${Math.round(frac*100)}%"></i></div></div>
      <button class="btn primary" data-act="gotomine">Review my questions →</button>
      <button class="btn ghost" data-act="changeseat">Change seat</button>
    </div>`;
}

function screenProgress(){
  const all = Q.map((item,idx)=>({item,idx}));
  const c = counts(all); const frac = c.total ? c.solid/c.total : 0;
  const groups = byDomain(all);
  const rows = Object.keys(DOMAINS).filter(k=>groups[k]).map(k=>{
    const cc = counts(groups[k]); const f = cc.total?cc.solid/cc.total:0;
    return `<div class="prow"><div class="pn">${DOMAINS[k].name}</div>
      <div class="ptrack"><i style="width:${Math.round(f*100)}%"></i></div>
      <div class="pc">${cc.solid}/${cc.total}</div></div>`;
  }).join("");
  return `<p class="eyebrow">My Progress</p>
    <div class="bigring">${ring(frac,64)}<div class="lbl"><b>${c.solid} / ${c.total}</b>questions you've marked solid on this device</div></div>
    <div style="background:var(--card);border:1px solid var(--line);border-radius:14px;padding:6px 14px;">${rows}</div>
    <div class="info">
      <h3>How the capacity interview works</h3>
      <p>A five-person evaluation team — split across student achievement, operations/governance, and finance — pressure-tests the application and judges whether <b>this board</b>, not just the CEO, can open the school.</p>
      <p>The outcome is a recommendation to approve, approve with conditions, or deny. The fastest route to "conditions" is a board that defers every substantive question to Melissa.</p>
    </div>
    <div class="installnote"><b>Install this app:</b> on iPhone tap Share → Add to Home Screen; on Android/desktop use the install icon in your browser. It then opens fullscreen and works offline.</div>
    <button class="btn ghost" data-act="reset" style="margin-top:14px;">Reset all readiness marks</button>`;
}

/* ================= Quiz ================= */
const FLAME = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 4 14h6l-1 8 10-12h-6l1-8Z"/></svg>`;

function shuffle(arr){
  const a = arr.slice();
  for (let i=a.length-1; i>0; i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function quizPool(){
  let list = Q.map((item,idx)=>({item,idx}));
  if (quizState.scope==="mine") list = list.filter(o => seat && (o.item.owners.includes(seat) || o.item.core));
  else if (quizState.scope==="sections") list = list.filter(o => quizState.sections.includes(o.item.d));
  return list;
}
function quizScopeKey(){
  if (quizState.scope==="mine") return "mine:"+(seat||"none");
  if (quizState.scope==="sections") return "sections:"+quizState.sections.slice().sort().join(",");
  return "all";
}
function quizBestKey(){ return "cg_quiz_best_"+quizScopeKey(); }
function getQuizBest(){ try { const v = store.get(quizBestKey()); return v ? JSON.parse(v) : { pct:0, streak:0 }; } catch(e){ return { pct:0, streak:0 }; } }
function saveQuizBest(pct, streak){
  const cur = getQuizBest();
  const next = { pct: Math.max(cur.pct, pct), streak: Math.max(cur.streak, streak) };
  store.set(quizBestKey(), JSON.stringify(next));
  return { improvedScore: pct > cur.pct, improvedStreak: streak > cur.streak, prev: cur };
}
function prepQuestion(){
  const s = quizState.session;
  const item = s.items[s.i].item;
  s.choiceOrder = shuffle(item.quiz.choices);
  s.selected = null;
  s.revealed = false;
}
function startQuiz(){
  const pool = shuffle(quizPool());
  const n = quizState.length==="all" ? pool.length : Math.min(quizState.length, pool.length);
  quizState.session = { items: pool.slice(0,n), i:0, score:0, streak:0, bestStreakRun:0, missed:[], choiceOrder:null, selected:null, revealed:false };
  prepQuestion();
  state.quizScreen = "play";
}

function screenQuizSetup(){
  const best = getQuizBest();
  const mineOK = !!seat;
  const scopeRows = `
    <button class="roleopt${quizState.scope==='mine'?' sel':''}${mineOK?'':' qz-disabled'}" data-qscope="mine" ${mineOK?'':'disabled'}>
      <div class="n">My assigned items</div><div class="r">${mineOK?`What ${MEMBERS[seat].short} owns, plus shared essentials`:'Pick your seat in My Seat first'}</div>
    </button>
    <button class="roleopt${quizState.scope==='sections'?' sel':''}" data-qscope="sections">
      <div class="n">Certain sections</div><div class="r">Choose one or more topics</div>
    </button>
    <button class="roleopt${quizState.scope==='all'?' sel':''}" data-qscope="all">
      <div class="n">Whole prep doc</div><div class="r">Every question, every domain</div>
    </button>`;
  const sectionPicker = quizState.scope==="sections" ? `<div class="chiprow">${Object.keys(DOMAINS).map(k=>
      `<button data-qsection="${k}" class="${quizState.sections.includes(k)?'on':''}">${DOMAINS[k].name}</button>`).join("")}</div>` : "";
  const poolSize = quizPool().length;
  const lengths = [5,10,"all"];
  const lenSeg = `<div class="seg">${lengths.map(l=>
      `<button data-qlen="${l}" class="${quizState.length===l?'on':''}">${l==="all"?"All":l}</button>`).join("")}</div>`;
  const bestNote = (best.pct>0 || best.streak>0)
    ? `<div class="qz-best"><b>Best for this quiz:</b> ${best.pct}% correct · longest streak ${best.streak}</div>` : "";
  const canStart = poolSize>0 && (quizState.scope!=="sections" || quizState.sections.length>0) && (quizState.scope!=="mine" || mineOK);
  return `<p class="eyebrow">Quiz</p>
    <p class="lead">Quick-fire multiple choice, three answers per question. Get one wrong and we'll teach it right back to you.</p>
    ${scopeRows}${sectionPicker}
    <p class="lead" style="margin-top:18px;">How many questions?</p>
    ${lenSeg}
    <p class="lead" style="margin:10px 0 0;">${poolSize} question${poolSize!==1?'s':''} available in this scope.</p>
    ${bestNote}
    <button class="btn primary" data-act="startquiz" ${canStart?'':'disabled'} style="margin-top:16px;">Start Quiz →</button>`;
}

function quizStreakHTML(s){
  return s.streak>1 ? `<div class="qz-streak">${FLAME}${s.streak} streak</div>` : `<div class="qz-streak">Score ${s.score}/${s.i}</div>`;
}
function quizFeedbackHTML(s){
  if (!s.revealed) return "";
  const item = s.items[s.i].item;
  const total = s.items.length;
  const wasRight = s.selected===item.quiz.answer;
  return `<div class="qz-feedback ${wasRight?'ok':'no'}">
      <b>${wasRight?'Nice — that\'s right':'Not quite — here\'s the teaching point'}</b>
      ${item.quiz.explain}
      <div class="qz-cite">Source · ${item.cite}</div>
    </div>
    <button class="btn primary" data-act="qznext" style="margin-top:14px;">${s.i+1<total?'Next question →':'See results →'}</button>`;
}
function screenQuizPlay(){
  const s = quizState.session;
  const item = s.items[s.i].item;
  const total = s.items.length;
  const frac = (s.i + (s.revealed?1:0)) / total;
  const choices = s.choiceOrder.map(c=>{
    let cls = "qz-choice";
    let dis = "";
    if (s.revealed){
      dis = "disabled";
      if (c===item.quiz.answer) cls += " correct";
      else if (c===s.selected) cls += " wrong";
    }
    return `<button class="${cls}" data-qchoice="${encodeURIComponent(c)}" ${dis}>${c}</button>`;
  }).join("");
  return `<div class="qz-progwrap">
      <div class="qz-progtext">Q ${s.i+1} / ${total}</div>
      <div class="qz-track"><i style="width:${Math.round(frac*100)}%"></i></div>
      ${quizStreakHTML(s)}
    </div>
    <div class="qz-code">${DOMAINS[item.d].code}</div>
    <div class="qz-stem">${item.quiz.q}</div>
    <div class="qz-choices">${choices}</div>
    <div id="qzFeedback">${quizFeedbackHTML(s)}</div>`;
}

function screenQuizResults(){
  const s = quizState.session;
  const total = s.items.length;
  const pct = total ? Math.round(s.score/total*100) : 0;
  const { improvedScore, improvedStreak } = saveQuizBest(pct, s.bestStreakRun);
  const badges = `${improvedScore?'<span class="qz-badge">New best score</span>':''}${improvedStreak?'<span class="qz-badge">New best streak</span>':''}`;
  const celebrate = pct>=80;
  const confetti = celebrate ? `<div class="qz-confetti">${[...Array(10)].map((_,i)=>`<span style="--i:${i}"></span>`).join("")}</div>` : "";
  const missed = s.missed.length ? `<div class="qz-lead2">Review what tripped you up</div>${s.missed.map(m=>`
      <div class="qz-missrow">
        <div class="qz-missq">${m.item.quiz.q}</div>
        <div class="qz-missa"><b>${m.item.quiz.answer}</b> — ${m.item.quiz.explain}</div>
      </div>`).join("")}` : `<p class="lead">Clean sweep — nothing to review.</p>`;
  return `<div class="qz-resultwrap">${confetti}
      <div class="bigring">${ring(total?s.score/total:0,64)}<div class="lbl"><b>${s.score} / ${total}</b>correct — ${pct}%</div></div>
    </div>
    <p class="lead">Longest streak this round: <b>${s.bestStreakRun}</b>. ${badges}</p>
    ${missed}
    <button class="btn primary" data-act="qzagain" style="margin-top:16px;">Play again →</button>
    <button class="btn ghost" data-act="qznewsetup">Change scope</button>`;
}

function screenQuiz(){
  if (state.quizScreen==="play" && quizState.session) return screenQuizPlay();
  if (state.quizScreen==="results" && quizState.session) return screenQuizResults();
  return screenQuizSetup();
}

/* ================= Render ================= */
const appbar = document.getElementById("appbar");
const screenInner = document.getElementById("screenInner");
const screenEl = document.getElementById("screen");
const tabbar = document.getElementById("tabbar");

const TABS = [
  { id:"prep",     label:"Prep",     icon:'<path d="M4 6h16M4 12h16M4 18h10"/>' },
  { id:"seat",     label:"My Seat",  icon:'<circle cx="12" cy="8" r="3.4"/><path d="M5 20c0-3.4 3.1-5.5 7-5.5s7 2.1 7 5.5"/>' },
  { id:"quiz",     label:"Quiz",     icon:'<path d="M13 3 4 14h6l-1 7 9-11h-6l1-7Z"/>' },
  { id:"progress", label:"Progress", icon:'<path d="M5 20V10M12 20V4M19 20v-7"/>' }
];

function renderAppbar(){
  if (state.tab==="prep" && state.topic){
    appbar.innerHTML = `<button class="backbtn" data-act="back" aria-label="Back">‹</button><div class="atitle">${DOMAINS[state.topic].name}</div>`;
  } else if (state.tab==="quiz" && state.quizScreen!=="setup"){
    const t = state.quizScreen==="results" ? "Results" : "Quiz";
    appbar.innerHTML = `<button class="backbtn" data-act="quizback" aria-label="Back">‹</button><div class="atitle">${t}</div>`;
  } else {
    const t = state.tab==="prep" ? "Board Prep" : state.tab==="seat" ? "My Seat" : state.tab==="quiz" ? "Quiz" : "My Progress";
    appbar.innerHTML = `${EMBLEM}<div class="atitle">${t}</div>`;
  }
}
function renderTabs(){
  tabbar.innerHTML = TABS.map(t=>`<button class="tab${state.tab===t.id?' on':''}" data-tab="${t.id}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${t.icon}</svg>
    <span class="tl">${t.label}</span></button>`).join("");
}
function render(){
  renderAppbar(); renderTabs();
  let html = "";
  if (state.tab==="prep") html = state.topic ? screenTopic(state.topic) : screenPrepList();
  else if (state.tab==="seat") html = screenSeat();
  else if (state.tab==="quiz") html = screenQuiz();
  else html = screenProgress();
  screenInner.innerHTML = html;
  screenEl.scrollTop = 0;
}

/* ================= Events ================= */
appbar.addEventListener("click",(e)=>{
  if (e.target.closest('[data-act="back"]')){ state.topic=null; render(); }
  if (e.target.closest('[data-act="quizback"]')){
    if (state.quizScreen==="play"){
      if (!confirm("Leave this quiz? Your progress in this round will be lost.")) return;
      quizState.session=null;
    }
    state.quizScreen="setup"; render();
  }
});

tabbar.addEventListener("click",(e)=>{
  const b=e.target.closest(".tab"); if(!b) return;
  state.tab=b.dataset.tab; state.topic=null; state.pickSeat=false; render();
});

screenEl.addEventListener("click",(e)=>{
  const topicBtn = e.target.closest(".trow");
  if (topicBtn){ state.topic=topicBtn.dataset.topic; render(); return; }

  const qscopeBtn = e.target.closest("[data-qscope]");
  if (qscopeBtn){ if(!qscopeBtn.disabled){ quizState.scope=qscopeBtn.dataset.qscope; render(); } return; }

  const qsectionBtn = e.target.closest("[data-qsection]");
  if (qsectionBtn){
    const k = qsectionBtn.dataset.qsection;
    const i = quizState.sections.indexOf(k);
    if (i===-1) quizState.sections.push(k); else quizState.sections.splice(i,1);
    render(); return;
  }

  const qlenBtn = e.target.closest("[data-qlen]");
  if (qlenBtn){ const v=qlenBtn.dataset.qlen; quizState.length = v==="all" ? "all" : Number(v); render(); return; }

  const qchoiceBtn = e.target.closest("[data-qchoice]");
  if (qchoiceBtn){
    const s = quizState.session;
    if (!s || s.revealed) return;
    const item = s.items[s.i].item;
    const choice = decodeURIComponent(qchoiceBtn.dataset.qchoice);
    s.selected = choice; s.revealed = true;
    if (choice === item.quiz.answer){ s.score++; s.streak++; s.bestStreakRun = Math.max(s.bestStreakRun, s.streak); }
    else { s.streak = 0; s.missed.push({ item, idx: s.items[s.i].idx }); }
    // Reveal in place — mark choices, drop in feedback, nudge progress; no full re-render (avoids scroll jump).
    screenInner.querySelectorAll(".qz-choice").forEach(b=>{
      b.disabled = true;
      const c = decodeURIComponent(b.dataset.qchoice);
      if (c===item.quiz.answer) b.classList.add("correct");
      else if (c===s.selected) b.classList.add("wrong");
    });
    const badge = screenInner.querySelector(".qz-streak"); if (badge) badge.outerHTML = quizStreakHTML(s);
    const bar = screenInner.querySelector(".qz-track i"); if (bar) bar.style.width = Math.round((s.i+1)/s.items.length*100)+"%";
    const fb = document.getElementById("qzFeedback");
    if (fb){ fb.innerHTML = quizFeedbackHTML(s); fb.scrollIntoView({ block:"nearest" }); }
    return;
  }

  const segBtn = e.target.closest(".seg button");
  if (segBtn){ state.scope=segBtn.dataset.scope; render(); return; }

  const seatBtn = e.target.closest("[data-seat]");
  if (seatBtn){ seat=seatBtn.dataset.seat; store.set("cg_seat",seat); state.scope="mine"; state.pickSeat=false; render(); return; }

  const act = e.target.closest("[data-act]");
  if (act){
    const a=act.dataset.act;
    if (a==="gotomine"){ state.tab="prep"; state.scope="mine"; state.topic=null; render(); }
    else if (a==="changeseat"){ state.pickSeat=true; render(); }
    else if (a==="cancelpick"){ state.pickSeat=false; render(); }
    else if (a==="reset"){ if(confirm("Clear every readiness mark for this device?")){ Q.forEach((_,i)=>store.del(rKey(i))); render(); } }
    else if (a==="startquiz"){ if(!act.disabled){ startQuiz(); render(); } }
    else if (a==="qznext"){
      const s = quizState.session;
      if (s.i+1 < s.items.length){ s.i++; prepQuestion(); render(); }
      else { state.quizScreen="results"; render(); }
    }
    else if (a==="qzagain"){ startQuiz(); render(); }
    else if (a==="qznewsetup"){ state.quizScreen="setup"; quizState.session=null; render(); }
    return;
  }

  const rateBtn = e.target.closest(".rate button");
  if (rateBtn){
    const card=e.target.closest(".card"), idx=card.dataset.idx, val=rateBtn.dataset.r;
    const next = store.get(rKey(idx))===val ? "" : val;
    if (next) store.set(rKey(idx),next); else store.del(rKey(idx));
    card.querySelectorAll(".rate button").forEach(b=>b.classList.remove("on","ok"));
    if (next){ rateBtn.classList.add("on"); if(next==="solid") rateBtn.classList.add("ok"); }
    card.classList.toggle("solid", next==="solid");
    return;
  }

  const top = e.target.closest(".card-top");
  if (top){
    const card=top.closest(".card"); const open=card.classList.toggle("open");
    top.setAttribute("aria-expanded", open?"true":"false");
    const hint=card.querySelector(".hint"); if(hint) hint.childNodes[1].textContent = open?" Tap to hide talking points":" Tap to reveal talking points";
  }
});
screenEl.addEventListener("keydown",(e)=>{
  const top=e.target.closest(".card-top");
  if (top && (e.key==="Enter"||e.key===" ")){ e.preventDefault(); top.click(); }
});

render();

/* ================= PWA ================= */
if ("serviceWorker" in navigator){
  window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}
</script>
</body>
</html>
