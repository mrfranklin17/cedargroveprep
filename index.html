<style>
  :root {
    --forest: #0F3B2C;
    --green: #2E7D46;
    --green-d: #256A3B;
    --sage: #9CBB8A;
    --sage-d: #7C9C6B;
    --sky: #C6DAE2;
    --sky-tint: #EBF3F6;
    --sky-line: #C3D6DE;
    --paper: #F6F8F3;
    --card: #FFFFFF;
    --ink: #1B2A20;
    --ink-soft: #56655A;
    --mute: #9AA79C;
    --line: #DCE3D6;
    --line-soft: #E8EDE2;
    --serif: "Newsreader", Georgia, serif;
    --sans: "Inter", system-ui, -apple-system, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
    background: var(--paper); color: var(--ink);
    font-family: var(--sans); font-size: 16px; line-height: 1.5; -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; }

  /* ---------- App bar ---------- */
  .appbar { flex: none; background: var(--forest); color: #EFF4EA; padding-top: env(safe-area-inset-top); }
  .appbar-inner { height: 54px; display: flex; align-items: center; gap: 10px; padding: 0 14px; }
  .aemblem { width: 30px; height: 26px; flex: none; }
  .atitle { font-family: var(--serif); font-size: 1.12rem; font-weight: 600; letter-spacing: .2px; }
  .backbtn {
    border: none; background: rgba(255,255,255,.12); color: #EFF4EA; width: 34px; height: 34px;
    border-radius: 9px; font-size: 1.4rem; line-height: 1; cursor: pointer; flex: none; display: flex; align-items: center; justify-content: center;
  }
  .backbtn:active { background: rgba(255,255,255,.22); }

  /* ---------- Scroll area ---------- */
  .screen { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
  .screen-inner { max-width: 640px; margin: 0 auto; padding: 16px 16px 30px; }

  /* ---------- Tab bar ---------- */
  .tabbar { flex: none; background: var(--card); border-top: 1px solid var(--line); display: flex; padding-bottom: env(safe-area-inset-bottom); }
  .tab { flex: 1; border: none; background: none; padding: 9px 4px 8px; display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--mute); cursor: pointer; }
  .tab svg { width: 23px; height: 23px; }
  .tab .tl { font-size: .64rem; letter-spacing: .02em; font-weight: 500; }
  .tab.on { color: var(--green-d); }
  .tab:active { opacity: .7; }

  /* ---------- Segmented control ---------- */
  .seg { display: inline-flex; background: var(--line-soft); border-radius: 11px; padding: 3px; margin-bottom: 16px; }
  .seg button { border: none; background: none; font-size: .84rem; padding: 8px 18px; border-radius: 8px; color: var(--ink-soft); cursor: pointer; }
  .seg button.on { background: var(--card); color: var(--forest); font-weight: 600; box-shadow: 0 1px 2px rgba(0,0,0,.09); }

  /* ---------- Topic rows ---------- */
  .trow { display: flex; align-items: center; gap: 13px; width: 100%; text-align: left; padding: 14px; background: var(--card); border: 1px solid var(--line); border-radius: 13px; margin-bottom: 10px; cursor: pointer; }
  .trow:active { background: var(--paper); }
  .tmid { flex: 1; min-width: 0; }
  .tmid .tn { font-family: var(--serif); font-size: 1.06rem; font-weight: 600; color: var(--forest); }
  .tmid .tsub { font-family: var(--mono); font-size: .58rem; letter-spacing: .1em; text-transform: uppercase; color: var(--sage-d); margin-top: 3px; }
  .trow .chev { color: var(--mute); font-size: 1.3rem; flex: none; }
  .ringwrap { flex: none; position: relative; width: 34px; height: 34px; }
  .ringwrap .rc { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: .56rem; color: var(--green-d); font-weight: 700; }

  /* ---------- Section intro ---------- */
  .lead { font-size: .93rem; color: var(--ink-soft); margin: 0 0 18px; }
  .lead b { color: var(--forest); }
  .eyebrow { font-family: var(--mono); font-size: .6rem; letter-spacing: .16em; text-transform: uppercase; color: var(--sage-d); margin: 2px 0 10px; }

  /* ---------- Question cards ---------- */
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; margin-bottom: 11px; overflow: hidden; }
  .card.solid { border-color: var(--green); box-shadow: inset 3px 0 0 var(--green); }
  .card-top { display: flex; gap: 11px; padding: 15px; cursor: pointer; align-items: flex-start; }
  .card-top:active { background: var(--paper); }
  .qcode { font-family: var(--mono); font-size: .62rem; font-weight: 700; color: var(--sage-d); padding-top: 3px; flex: none; }
  .qmain { flex: 1; min-width: 0; }
  .qtext { font-family: var(--serif); font-size: 1.06rem; line-height: 1.32; color: var(--forest); }
  .owners { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; }
  .chip { font-family: var(--mono); font-size: .56rem; letter-spacing: .04em; text-transform: uppercase; padding: 3px 8px; border-radius: 20px; border: 1px solid var(--line); color: var(--ink-soft); background: var(--paper); }
  .chip.lead { border-color: var(--green); color: var(--green-d); background: #E7F1EA; }
  .chip.all { border-color: var(--sky-line); color: var(--forest); background: #DDEBF0; }
  .hint { font-family: var(--mono); font-size: .62rem; letter-spacing: .07em; text-transform: uppercase; color: var(--green-d); margin-top: 11px; display: inline-flex; align-items: center; gap: 5px; }
  .hint .chev { transition: transform .2s ease; }
  .card.open .hint .chev { transform: rotate(90deg); }
  .answer { display: none; padding: 0 15px 15px; }
  .card.open .answer { display: block; animation: fade .24s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  .answer .div { height: 1px; background: var(--line-soft); margin: 0 0 4px; }
  .answer h4 { font-family: var(--mono); font-size: .58rem; letter-spacing: .13em; text-transform: uppercase; color: var(--sage-d); margin: 15px 0 8px; }
  .answer ul { margin: 0; padding-left: 18px; }
  .answer li { margin-bottom: 8px; font-size: .95rem; }
  .cite { font-family: var(--mono); font-size: .64rem; color: var(--ink-soft); background: var(--paper); border: 1px solid var(--line-soft); padding: 8px 11px; border-radius: 7px; margin-top: 13px; }
  .coach { background: var(--sky-tint); border: 1px solid var(--sky-line); border-left: 3px solid var(--green); padding: 11px 13px; border-radius: 7px; margin-top: 12px; font-size: .88rem; }
  .coach b { color: var(--green-d); }
  .rate { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; padding-top: 13px; border-top: 1px solid var(--line-soft); }
  .rate span { font-family: var(--mono); font-size: .56rem; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-soft); width: 100%; }
  .rate button { font-size: .84rem; padding: 9px 8px; border-radius: 22px; min-height: 42px; border: 1px solid var(--line); background: var(--card); color: var(--ink-soft); cursor: pointer; flex: 1; transition: background .15s, color .15s; }
  .rate button:active { transform: scale(.97); }
  .rate button.on { background: var(--forest); border-color: var(--forest); color: #EFF4EA; }
  .rate button.on.ok { background: var(--green); border-color: var(--green); }

  /* ---------- My Seat ---------- */
  .roleopt { width: 100%; text-align: left; display: block; padding: 14px 15px; border: 1px solid var(--line); border-radius: 13px; background: var(--card); margin-bottom: 10px; cursor: pointer; }
  .roleopt:active { background: var(--paper); }
  .roleopt .n { font-family: var(--serif); font-size: 1.08rem; font-weight: 600; color: var(--forest); }
  .roleopt .r { font-family: var(--mono); font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; color: var(--green-d); margin-top: 3px; }
  .roleopt.sel { border-color: var(--green); box-shadow: inset 3px 0 0 var(--green); }
  .seatcard { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
  .seatcard .nm { font-family: var(--serif); font-size: 1.35rem; font-weight: 600; color: var(--forest); line-height: 1.1; }
  .seatcard .rl { font-family: var(--mono); font-size: .64rem; letter-spacing: .1em; text-transform: uppercase; color: var(--green-d); margin: 5px 0 14px; }
  .seatcard .ow { font-size: .92rem; color: var(--ink); }
  .seatcard .ow b { color: var(--forest); }
  .seatcard .coi { background: var(--sky-tint); border: 1px solid var(--sky-line); border-left: 3px solid var(--green); padding: 11px 13px; border-radius: 8px; margin-top: 13px; font-size: .86rem; }
  .seatcard .coi b { color: var(--green-d); }
  .readbar { margin: 16px 0 4px; }
  .readbar .rl2 { font-size: .84rem; color: var(--ink-soft); margin-bottom: 7px; }
  .readbar .rl2 b { color: var(--forest); font-weight: 600; }
  .track { height: 9px; background: var(--line); border-radius: 5px; overflow: hidden; }
  .track i { display: block; height: 100%; background: var(--green); border-radius: 5px; transition: width .4s ease; }
  .btn { display: block; width: 100%; text-align: center; padding: 13px; border-radius: 12px; font-size: .92rem; font-weight: 600; cursor: pointer; border: 1px solid var(--line); }
  .btn.primary { background: var(--forest); color: #EFF4EA; border-color: var(--forest); margin-top: 6px; }
  .btn.ghost { background: var(--card); color: var(--green-d); margin-top: 10px; }
  .btn:active { opacity: .88; }

  /* ---------- Progress ---------- */
  .bigring { display: flex; align-items: center; gap: 18px; background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 18px; margin-bottom: 18px; }
  .bigring .lbl { font-size: .95rem; color: var(--ink-soft); }
  .bigring .lbl b { display: block; font-family: var(--serif); font-size: 1.9rem; color: var(--forest); line-height: 1; margin-bottom: 4px; }
  .prow { display: flex; align-items: center; gap: 12px; padding: 12px 2px; border-bottom: 1px solid var(--line-soft); }
  .prow:last-child { border-bottom: none; }
  .prow .pn { flex: 1; font-size: .92rem; color: var(--ink); }
  .prow .pc { font-family: var(--mono); font-size: .68rem; color: var(--ink-soft); }
  .prow .ptrack { width: 84px; height: 7px; background: var(--line); border-radius: 4px; overflow: hidden; flex: none; }
  .prow .ptrack i { display: block; height: 100%; background: var(--green); }
  .info { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px; margin: 20px 0 14px; }
  .info h3 { font-family: var(--serif); font-size: 1.1rem; color: var(--forest); margin: 0 0 8px; font-weight: 600; }
  .info p { font-size: .9rem; color: var(--ink-soft); margin: 0 0 8px; }
  .info p:last-child { margin-bottom: 0; }
  .installnote { font-size: .82rem; color: var(--ink-soft); background: var(--sky-tint); border: 1px solid var(--sky-line); border-radius: 10px; padding: 12px 14px; margin-top: 12px; }
  .installnote b { color: var(--forest); }

  :focus-visible { outline: 2px solid var(--green); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
  @media (min-width: 760px) { .screen-inner { max-width: 680px; } }
</style>
</head>

<script>
/* ================= Data ================= */
const MEMBERS = {
  pettey:  { short:"Pettey",   name:"Melissa Pettey", role:"CEO & Founding Principal · non-voting",
             owns:"The entire model. Primary voice on academic design, community engagement, and facilities. In the room she should let board members carry governance, finance, and their own domains — she cannot be the only one who can answer.",
             coi:"Prior Spokane relationships (Lumen, vendors, colleagues) inform hiring/contracting; mitigated by published rubrics + finance-committee review." },
  wiegner: { short:"Wiegner",  name:"Ashley Wiegner", role:"Board Chair",
             owns:"Governance architecture, CEO evaluation, board independence and recruitment, talent/human-capital systems.",
             coi:"Executive in Residence at ESWA — Cedar Grove's incubation partner. Recuses from all ESWA contract/funding votes." },
  franklin:{ short:"Franklin", name:"Travis Franklin", role:"Board Treasurer",
             owns:"The financial model end to end — revenue assumptions, reserves, days cash, audit, contracting thresholds. Chairs Finance Committee.",
             coi:"Gates Foundation Program Officer + ESWA co-founder + SIA founder. Recuses from ESWA contracts and any Gates-connected funding; does not make Gates grant decisions for Cedar Grove." },
  wright:  { short:"Wright",   name:"Dr. Dia Joy Wright", role:"Board Secretary",
             owns:"Belonging/equity as measurable systems, records and compliance, integrity of community co-creation.",
             coi:"" },
  dunn:    { short:"Dunn",     name:"Dr. Mike Dunn", role:"Board Member",
             owns:"Curriculum and standards alignment, special education and ESD 101 services, instructional systems.",
             coi:"Former ESD 101 Superintendent (15 yrs); ESD 101 is a confirmed service provider. Recuses from ESD 101 service-agreement votes." }
};
const ORDER = ["pettey","wiegner","franklin","wright","dunn"];

const DOMAINS = {
  MISSION:  { code:"MSN", name:"Mission, Vision & Identity", lens:"Achievement" },
  MODEL:    { code:"MDL", name:"Academic Model & Design", lens:"Achievement" },
  OUTCOMES: { code:"OUT", name:"Outcomes & Accountability", lens:"Achievement / Gov" },
  STUDENTS: { code:"STU", name:"Serving All Students", lens:"Achievement" },
  GOV:      { code:"GOV", name:"Governance & Board Capacity", lens:"Governance" },
  COI:      { code:"COI", name:"Conflicts of Interest", lens:"Governance" },
  FIN:      { code:"FIN", name:"Financial Plan", lens:"Finance" },
  ENROLL:   { code:"ENR", name:"Enrollment & Demand", lens:"Operations" },
  FACILITY: { code:"FAC", name:"Facilities", lens:"Operations" },
  COMMUNITY:{ code:"COM", name:"Community Engagement", lens:"Operations" },
  RISK:     { code:"RSK", name:"Challenges & Contingency", lens:"Cross-cutting" }
};

const Q = [
  { d:"MISSION", core:true, owners:["all"], q:"In one minute, what is Cedar Grove and who is it for?",
    points:["A 6–12 public charter opening Fall 2027 in Spokane, serving students historically shut out of college pathways — first-generation, and students navigating income, race, language, or disability barriers.","Mission: a joyful community where every student is <b>known, challenged, and empowered</b>, prepared for college and lives of purpose through rigorous, active learning.","The grove metaphor is the thesis: deep roots (knowledge, identity, relationships, purpose) plus shared growth — students grow the way forests do, in relationship, not isolation."],
    cite:"Prompt 2.1 Mission, Vision, Purpose" },
  { d:"MISSION", core:true, owners:["all"], q:"What are the ROOTS values, and where do they actually show up?",
    points:["Rooted in Identity · Open Bold Futures · Own Your Path · Think Deeply · Strengthen Community.","They aren't a poster — they function as daily behavioral expectations. 'Strengthen Community' is the operational core of the discipline and safety approach: students are responsible for the environment, not just their own conduct."],
    cite:"Prompt 2.2 Key Design Elements; Safe Environment section" },

  { d:"MODEL", core:true, owners:["pettey","dunn"], q:"Walk us through your instructional model. What are the design pillars?",
    points:["Four pillars: (1) Rigorous, Active Learning; (2) Belonging, Joy & Agency; (3) Navigate & Launch — college/career readiness; (4) Every Student Is Known — purpose and 'the Branch.'","Rigor is defined as the <b>quality of thinking</b>, not volume of work. College-prep by default, no remedial tracks — differentiated support, not lowered expectations.","Grounded in research: Bjork (desirable difficulties), Darling-Hammond (whole-child), Conley (Four Keys)."],
    cite:"Prompt 2.2 Key Design Elements" },
  { d:"MODEL", owners:["pettey","dunn"], q:"What is a 'Canopy Conversation' and how is it more than a buzzword?",
    points:["A structured Socratic seminar built into <b>every subject, grades 6–12</b>, sequenced from guided participation in MS to fully student-led discourse by 12th grade.","It's a practiced skill built over seven years, not an aspiration. Validated by a site visit to Washington Latin, where a team member joined a Socratic <i>math</i> seminar.","Ties to research on discussion-based learning and adolescent identity (Harter)."],
    cite:"Prompt 2.2 — The Canopy Conversation" },
  { d:"MODEL", owners:["pettey"], q:"Describe the Grove Journey and June Term. Is June Term instructional time or enrichment?",
    points:["Seven-year arc; each grade has a theme, an outdoor environment, and a community partner, moving from local experiences in 6th toward internships and independent launch by 12th.","June Term is 2–3 weeks at the end of each year — internships, expeditions, financial literacy, college navigation. It's applied core learning, not enrichment: 'the internship is a job.'","Culminates in a capstone narrative defended before a panel including a community/professional member."],
    cite:"Prompt 2.2 — Grove Journey / June Term; Design Pillar 4" },
  { d:"MODEL", owners:["dunn","pettey"], q:"What curriculum are you using, and how will you guarantee alignment to Washington standards?",
    points:["College-prep sequence with AP access for all and College in the High School; a curriculum crosswalk mapping every unit to WA EALRs/GLEs is committed by <b>December 2026</b>.","Annual principal-led curriculum audit against OSPI guidance; Mike Dunn (WSU, 15-yr ESD 101 superintendent) is the standing standards-alignment resource.","External verification via SBAC, PSAT/SAT, and interim assessments; full engagement with WISF."],
    cite:"Prompt 2.2 — Curriculum Alignment" },
  { d:"MODEL", owners:["pettey"], q:"You lean heavily on AI literacy. What does that mean concretely for a 6–12 school?",
    points:["AI literacy is taught as an explicit competency alongside note-taking and self-advocacy: students use AI as a thinking partner, evaluate its output, and understand its ethical limits.","Framed as future-readiness — the judgment employers and colleges will expect from day one."],
    cite:"Prompt 2.2 — AI Literacy and Future-Ready Skills" },

  { d:"OUTCOMES", core:true, owners:["pettey","wright"], q:"What are your Year-5 outcome goals, and how will the commission know if you're succeeding?",
    points:["Five goal areas mirroring the mission. Headline Yr-5 targets: SBAC meet/exceed state avg with closing subgroup gaps; 80% meet SAT/ACT benchmarks; 90%+ retention; 95% complete ≥1 capstone/internship; 100% accepted to ≥1 two/four-year institution; grad rate ≥ state (~85%); 80%+ enroll postsecondary within a year; 70%+ persist to year two.","<b>Every target disaggregated</b> by race, income, IEP/504, and EL — the school is 'not successful if any subgroup is systematically excluded.'"],
    cite:"Prompt 2.3 Outcomes — goal table" },
  { d:"OUTCOMES", owners:["wright","pettey"], q:"How do you measure 'belonging' without hand-waving? It's easy to claim, hard to prove.",
    points:["Belonging is operationalized as measurable systems, not aspirational language — 90%+ annual retention with exit interviews for every departing student, plus bi-annual climate surveys reported publicly with action plans within 30 days.","Dr. Wright's role is specifically to ensure 'belonging, joy, and agency' is tracked through measurable systems and ongoing evaluation."],
    cite:"Prompt 2.3; Dr. Wright bio" },
  { d:"OUTCOMES", owners:["wiegner","pettey"], q:"When the school misses a target, what actually happens at the board level?",
    points:["CEO reports on a defined cycle: monthly academic dashboard, bi-annual climate results, annual performance report.","Board receives a formal annual report tied to the charter performance framework, disaggregated, with year-over-year trends from Year 2; the Academic Achievement Committee reviews meeting/approaching/falling-short status and the board holds the CEO to action plans when targets are missed.","Local precedent: Lumen's mission-specific Academic Performance Framework negotiated with SPS, renewed with no conditions."],
    cite:"Prompt 2.3 — Board Accountability" },

  { d:"STUDENTS", owners:["dunn","pettey"], q:"What percent of students do you project as SWD and multilingual, and how are you staffed to serve them?",
    points:["At full enrollment: ~14% students with disabilities, ~13% multilingual learners — intentionally above the SPS ML baseline (~7–8%) because of targeted outreach.","'Inclusion by design': MTSS + co-teaching/push-in in gen-ed, UDL from the outset, LRE default placement in the general classroom.","SpEd related services (psych, speech, OT/PT) contracted through ESD 101, scaling with enrollment; in-house specialists added as the school grows."],
    cite:"Prompt 2.2 — Serving Students with Disabilities and ML" },
  { d:"STUDENTS", owners:["dunn"], q:"If SWD enrollment comes in higher than projected in Year 1, what's your plan?",
    points:["Increase ESD 101 contracted services, adjust co-teaching ratios, and direct additional SpEd funding to expanded capacity.","If lower than projected, the inclusive structures (UDL, MTSS) stay — they benefit all learners regardless of subgroup size."],
    cite:"Prompt 2.2 — Evaluation of Effectiveness and Adaptation" },
  { d:"STUDENTS", owners:["pettey","wright"], q:"'College-prep by default, no tracking' sounds good — but how does a struggling 6th grader actually access rigor?",
    points:["Support is layered onto the same rigorous curriculum, never a separate lower track: embedded intervention blocks in the master schedule (a structural commitment, not an afterthought), co-teaching, and UDL.","Modeled on the Uncommon Schools site visit — intervention as design, not a sign of failure. 'What differs across learners is not the expectation but the level of support.'"],
    cite:"Prompt 2.2 — Design Pillar 1; Uncommon site visit" },

  { d:"GOV", core:true, owners:["wiegner"], q:"Describe the division of authority between the board and the CEO.",
    points:["The board governs; the CEO and staff manage. Board approves/monitors the strategic plan and budget, hires/evaluates/replaces the CEO, adopts policy, monitors outcomes against authorizer goals, and safeguards financial sustainability.","The CEO executes the academic program and operations, and hires/supervises/terminates all staff. The CEO is a <b>non-voting</b> participant at board meetings."],
    cite:"Prompt 3.1 — Board of Directors; Division of Responsibilities" },
  { d:"GOV", owners:["wiegner"], q:"What's your board composition, term structure, and committee model?",
    points:["7–11 members recruited via a skills-and-values matrix (education, finance, legal, HR, philanthropy, facilities, equity, community), with staggered 3-year terms and intentional representation from first-gen graduates and communities of color.","Officers: Chair (Wiegner), Vice Chair, Secretary (Wright), Treasurer (Franklin). Four standing committees: Governance, Academic Achievement, Finance, Development (which drives 100% board giving)."],
    cite:"Prompt 3.1 — Composition and Officers; Board Committees" },
  { d:"GOV", owners:["wiegner","franklin"], q:"Your board isn't fully seated. Isn't that a capacity risk?",
    points:["Named seated board: Pettey (CEO, non-voting), Wiegner (Chair), Franklin (Treasurer), Wright (Secretary), Dunn (Member).","Acknowledged gaps with a concrete plan: recruiting finance, legal, and facilities/real-estate expertise; target full board seated by Fall 2026; partnering with Jen Wickens/Seminar to source Spokane candidates.","Frame it as disciplined sequencing, not a hole — recruiting to a matrix rather than filling seats fast."],
    coach:"Be ready to name exactly which seats are still open and your recruiting timeline — a not-yet-full board is a predictable pressure point.",
    cite:"Prompt 1.2 — Gap Closure Strategy; 3.1 Composition" },
  { d:"GOV", owners:["wiegner"], q:"How does the board hold itself accountable, not just the CEO?",
    points:["Annual summer retreat to set goals and committee workplans; a board KPI dashboard reviewed at every meeting; a structured annual CEO evaluation run by the Governance Committee; and an annual board self-assessment with a written improvement plan."],

  { d:"FIN", owners:["franklin"], q:"Who manages the money day-to-day, and what are your controls and audit plan?",

    points:["Direct outreach to 8th-grade families, trusted-partner channels (Boys & Girls Club, Communities in Schools, YMCA, AIER, Unity in the Community), a Family Ambassador model, and multilingual materials.","Enrollment consultant Vanessa Barry (Mariposa) — an ESWA-portfolio specialist in charter enrollment via social, events, and earned media — works directly with Melissa on the launch plan.","Open lottery compliant with WA charter law; recruitment tracked by ZIP, feeder school, and first-gen status."],

  { d:"FACILITY", core:true, owners:["pettey"], q:"You don't have a signed facility. What's the status and the backup?",
    points:["Active search on multiple fronts. Lead near-term option: co-location with Innovation Public Schools (811 E. Sprague) — the owner (Growler Co.) and Innovation's ED and Board Chair have confirmed a co-location would be welcomed (letter of support, Attachment 11).","Three additional sites identified via 4 Degrees Real Estate (the firm that sited Lumen); two downtown near the bus plaza, one near Innovation.","Goal: evaluate 2–4 options by Spring 2027 and secure a lease/MOU before opening. Long-term preference is to own, exploring Opportunity Zone / New Market Tax Credit financing."],
    coach:"Facilities lead is currently Melissa; a board member with real-estate expertise is still being recruited. Be ready to say who takes primary ownership and when.",

  { d:"FACILITY", owners:["pettey"], q:"What are your actual space requirements, Year 1 and at build-out?",
    points:["Year 1: ~24,000–26,000 sq ft — 10 classrooms, 2 SpEd/intervention rooms, gym/multipurpose, wellness room, counseling/college center, offices. Science labs added from Year 2.","Space scales with the grade build-out toward full enrollment of 780, adding science labs, expanded intervention space, and a full gym."],
    cite:"Prompt 2.4 — Space Requirements" },

  { d:"COMMUNITY", owners:["pettey","wright"], q:"Show us this was built WITH the community, not just marketed to it.",
    points:["Engagement prioritized listening before designing: 15+ formal stakeholder meetings, two Design Team phases (35–40+ participants), 10+ community events, 90 surveys, 50+ supporter cards.","Concrete design changes from feedback — expanding to include middle school, and elevating belonging/joy/athletics as core elements after families named them.","Partners: Carl Maxey Center, Communities in Schools, New Developed Nations, Seattle U PEBCI, plus higher-ed guidance from EWU and Seattle U."],
    cite:"Prompt 1.1 — Stakeholder Engagement" },
  { d:"COMMUNITY", owners:["wright"], q:"How do you keep community engagement from becoming performative once you're authorized?",

  { d:"RISK", core:true, owners:["pettey","wiegner"], q:"What's the single biggest risk to opening, and how are you managing it?",
    points:["Naming it plainly: disrupting Spokane's neighborhood-school norm — choosing a new public option feels unfamiliar and risky to families.","Evidence the ground is shifting: private enrollment up 25.8%; SPS down ~1,800 students (~6%) since 2021. Strategy targets families already making active choices and builds through trusted networks.","Secondary risks — facility and educator recruitment — have concrete mitigation (multiple sites, mission-aligned hiring, ESWA incubation support)."],
    cite:"1.1 Coalition Challenges; NOI Anticipated Challenges" },
  { d:"RISK", owners:["pettey","dunn"], q:"Educator recruitment is brutal right now. How do you staff a brand-new school?",
    points:["Mission-aligned hiring against published rubrics, ongoing professional learning, and systems built for collaboration and retention.","Talent depth on the board: Wiegner built human-capital systems at DSST and launched campuses at Uncommon; job descriptions and a talent strategy are already developed.","Summer camps and a Year-1 founding-team hiring timeline (all roles posted by 12/1/2026, founding staff hired by Feb 2027)."],
    cite:"1.2 team; 3.2 milestones" }
];

/* ================= Persistence ================= */
let mem = {};
const store = {
  get(k){ try { const v = localStorage.getItem(k); return v===null ? mem[k] : v; } catch(e){ return mem[k]; } },
  set(k,v){ try { localStorage.setItem(k,v); } catch(e){ mem[k]=v; } },
  del(k){ try { localStorage.removeItem(k); } catch(e){} delete mem[k]; }
};
const rKey = i => "cg_rate_"+i;

/* ================= State ================= */
let seat = store.get("cg_seat") || null;
let state = { tab: seat ? "prep" : "seat", topic: null, scope: seat ? "mine" : "all", pickSeat: false };

/* ================= Helpers ================= */
const EMBLEM = `<svg class="aemblem" viewBox="0 0 120 100" aria-hidden="true">
  <path d="M16,72 C33,66 52,68 60,76 L60,84 C52,76 33,74 16,78 Z" fill="#C6DAE2"/>
  <path d="M104,72 C87,66 68,68 60,76 L60,84 C68,76 87,74 104,78 Z" fill="#C6DAE2"/>
  <g fill="#9CBB8A">
    <g transform="translate(31,28) scale(0.7)"><polygon points="0,0 8,16 4,16 13,32 7,32 19,50 -19,50 -7,32 -13,32 -4,16 -8,16"/><rect x="-2.5" y="48" width="5" height="13"/></g>
    <g transform="translate(89,28) scale(0.7)"><polygon points="0,0 8,16 4,16 13,32 7,32 19,50 -19,50 -7,32 -13,32 -4,16 -8,16"/><rect x="-2.5" y="48" width="5" height="13"/></g>
    <g transform="translate(60,10)"><polygon points="0,0 8,16 4,16 13,32 7,32 19,50 -19,50 -7,32 -13,32 -4,16 -8,16"/><rect x="-2.5" y="48" width="5" height="16"/></g>
  </g></svg>`;

function inScope(item){
  if (state.scope === "all" || !seat) return true;
  return item.owners.includes(seat) || item.core;
}
function scoped(){ return Q.map((item,idx)=>({item,idx})).filter(o=>inScope(o.item)); }
function byDomain(list){ const g={}; list.forEach(o=>(g[o.item.d]=g[o.item.d]||[]).push(o)); return g; }
function counts(list){ let s=0; list.forEach(o=>{ if(store.get(rKey(o.idx))==="solid") s++; }); return {solid:s,total:list.length}; }

function ring(frac, size){
  const r=(size-5)/2, c=2*Math.PI*r, off=c*(1-frac);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--line)" stroke-width="4"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--green)" stroke-width="4" stroke-linecap="round"
      stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 ${size/2} ${size/2})"/>
  </svg>`;
}
function ownerChips(owners){
  return owners.filter(o=>o!=="all").map((o,i)=>`<span class="chip${i===0?' lead':''}">${MEMBERS[o].short}</span>`).join("");
}
function cardHTML(item, idx, n, code){
  const rating = store.get(rKey(idx)) || "";
  const allChip = item.core ? `<span class="chip all">All</span>` : "";
  return `<div class="card${rating==="solid"?" solid":""}" data-idx="${idx}">
    <div class="card-top" role="button" tabindex="0" aria-expanded="false">
      <div class="qcode">${code}·${String(n).padStart(2,"0")}</div>
      <div class="qmain">
        <div class="qtext">${item.q}</div>
        <div class="owners">${allChip}${ownerChips(item.owners)}</div>
        <div class="hint"><span class="chev">▸</span> Tap to reveal talking points</div>
      </div>
    </div>
    <div class="answer">
      <div class="div"></div>
      <h4>Talking points — from the submitted application</h4>
      <ul>${item.points.map(p=>`<li>${p}</li>`).join("")}</ul>
      ${item.coach?`<div class="coach"><b>Coach's note:</b> ${item.coach}</div>`:``}
      <div class="cite">Source · ${item.cite}</div>
      <div class="rate">
        <span>Readiness</span>
        <button data-r="notyet"${rating==="notyet"?' class="on"':''}>Not yet</button>
        <button data-r="getting"${rating==="getting"?' class="on"':''}>Getting there</button>
        <button data-r="solid"${rating==="solid"?' class="on ok"':''}>Solid</button>
      </div>
    </div></div>`;
}

/* ================= Screens ================= */
function screenPrepList(){
  const groups = byDomain(scoped());
  const keys = Object.keys(DOMAINS).filter(k=>groups[k] && groups[k].length);
  const seg = seat ? `<div class="seg">
      <button data-scope="mine" class="${state.scope==='mine'?'on':''}">My questions</button>
      <button data-scope="all" class="${state.scope==='all'?'on':''}">All topics</button>
    </div>` : ``;
  const intro = seat
    ? `<p class="lead">Showing ${state.scope==='mine'?`what <b>${MEMBERS[seat].short}</b> owns, plus shared essentials`:`all topics`}. Tap a topic to drill in.</p>`
    : `<p class="lead">Pick your seat in <b>My Seat</b> to focus on what you own — or browse every topic here.</p>`;
  const rows = keys.map(k=>{
    const c = counts(groups[k]); const frac = c.total ? c.solid/c.total : 0;
    return `<button class="trow" data-topic="${k}">
      <div class="ringwrap">${ring(frac,34)}<div class="rc">${c.solid}/${c.total}</div></div>
      <div class="tmid"><div class="tn">${DOMAINS[k].name}</div><div class="tsub">${DOMAINS[k].lens} lens · ${c.total} question${c.total!==1?'s':''}</div></div>
      <div class="chev">›</div>
    </button>`;
  }).join("");
  return `<p class="eyebrow">Prepare</p>${seg}${intro}${rows || `<p class="lead">No questions for this filter.</p>`}`;
}

function screenTopic(k){
  const list = byDomain(scoped())[k] || [];
  const body = list.map((o,i)=>cardHTML(o.item,o.idx,i+1,DOMAINS[k].code)).join("");
  return `<p class="eyebrow">${DOMAINS[k].lens} lens</p><p class="lead">${list.length} question${list.length!==1?'s':''} — answer each out loud before revealing the talking points, then mark your readiness.</p>${body}`;
}

function screenSeat(){
  if (!seat || state.pickSeat){
    const opts = ORDER.map(id=>`<button class="roleopt${seat===id?' sel':''}" data-seat="${id}">
      <div class="n">${MEMBERS[id].name}</div><div class="r">${MEMBERS[id].role.split(" ·")[0]}</div></button>`).join("");
    return `<p class="eyebrow">My Seat</p><p class="lead">Which seat are you? This focuses your prep on what you'll be asked to own.</p>${opts}
      ${seat?`<button class="btn ghost" data-act="cancelpick">Keep ${MEMBERS[seat].short}</button>`:``}`;
  }
  const m = MEMBERS[seat];
  const mine = Q.map((item,idx)=>({item,idx})).filter(o=>o.item.owners.includes(seat) || o.item.core);
  const c = counts(mine); const frac = c.total ? c.solid/c.total : 0;
  const coi = m.coi ? `<div class="coi"><b>⚑ Conflict to manage:</b> ${m.coi}</div>` : "";
  return `<p class="eyebrow">My Seat</p>
    <div class="seatcard">
      <div class="nm">${m.name}</div><div class="rl">${m.role}</div>
      <div class="ow"><b>What you own:</b> ${m.owns}</div>
      ${coi}
      <div class="readbar"><div class="rl2">Your readiness — <b>${c.solid} of ${c.total}</b> of your questions marked solid</div>
        <div class="track"><i style="width:${Math.round(frac*100)}%"></i></div></div>
      <button class="btn primary" data-act="gotomine">Review my questions →</button>
      <button class="btn ghost" data-act="changeseat">Change seat</button>
    </div>`;
}

function screenProgress(){
  const all = Q.map((item,idx)=>({item,idx}));
  const c = counts(all); const frac = c.total ? c.solid/c.total : 0;
  const groups = byDomain(all);
  const rows = Object.keys(DOMAINS).filter(k=>groups[k]).map(k=>{
    const cc = counts(groups[k]); const f = cc.total?cc.solid/cc.total:0;
    return `<div class="prow"><div class="pn">${DOMAINS[k].name}</div>
      <div class="ptrack"><i style="width:${Math.round(f*100)}%"></i></div>
      <div class="pc">${cc.solid}/${cc.total}</div></div>`;
  }).join("");
  return `<p class="eyebrow">Team Progress</p>
    <div class="bigring">${ring(frac,64)}<div class="lbl"><b>${c.solid} / ${c.total}</b>questions marked solid across the board</div></div>
    <div style="background:var(--card);border:1px solid var(--line);border-radius:14px;padding:6px 14px;">${rows}</div>
    <div class="info">
      <h3>How the capacity interview works</h3>
      <p>A five-person evaluation team — split across student achievement, operations/governance, and finance — pressure-tests the application and judges whether <b>this board</b>, not just the CEO, can open the school.</p>
      <p>The outcome is a recommendation to approve, approve with conditions, or deny. The fastest route to "conditions" is a board that defers every substantive question to Melissa.</p>
    </div>
    <div class="installnote"><b>Install this app:</b> on iPhone tap Share → Add to Home Screen; on Android/desktop use the install icon in your browser. It then opens fullscreen and works offline.</div>
    <button class="btn ghost" data-act="reset" style="margin-top:14px;">Reset all readiness marks</button>`;
}

/* ================= Render ================= */
const appbar = document.getElementById("appbar");
const screenInner = document.getElementById("screenInner");
const screenEl = document.getElementById("screen");
const tabbar = document.getElementById("tabbar");

const TABS = [
  { id:"prep",     label:"Prep",     icon:'<path d="M4 6h16M4 12h16M4 18h10"/>' },
  { id:"seat",     label:"My Seat",  icon:'<circle cx="12" cy="8" r="3.4"/><path d="M5 20c0-3.4 3.1-5.5 7-5.5s7 2.1 7 5.5"/>' },
  { id:"progress", label:"Progress", icon:'<path d="M5 20V10M12 20V4M19 20v-7"/>' }
];

function renderAppbar(){
  if (state.tab==="prep" && state.topic){
    appbar.innerHTML = `<button class="backbtn" data-act="back" aria-label="Back">‹</button><div class="atitle">${DOMAINS[state.topic].name}</div>`;
  } else {
    const t = state.tab==="prep" ? "Board Prep" : state.tab==="seat" ? "My Seat" : "Team Progress";
    appbar.innerHTML = `${EMBLEM}<div class="atitle">${t}</div>`;
  }
}
function renderTabs(){
  tabbar.innerHTML = TABS.map(t=>`<button class="tab${state.tab===t.id?' on':''}" data-tab="${t.id}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${t.icon}</svg>
    <span class="tl">${t.label}</span></button>`).join("");
}
function render(){
  renderAppbar(); renderTabs();
  let html = "";
  if (state.tab==="prep") html = state.topic ? screenTopic(state.topic) : screenPrepList();
  else if (state.tab==="seat") html = screenSeat();
  else html = screenProgress();
  screenInner.innerHTML = html;
  screenEl.scrollTop = 0;
}

/* ================= Events ================= */
appbar.addEventListener("click",(e)=>{
  if (e.target.closest('[data-act="back"]')){ state.topic=null; render(); }
});

tabbar.addEventListener("click",(e)=>{
  const b=e.target.closest(".tab"); if(!b) return;
  state.tab=b.dataset.tab; state.topic=null; state.pickSeat=false; render();
});

screenEl.addEventListener("click",(e)=>{
  const topicBtn = e.target.closest(".trow");
  if (topicBtn){ state.topic=topicBtn.dataset.topic; render(); return; }

  const segBtn = e.target.closest(".seg button");
  if (segBtn){ state.scope=segBtn.dataset.scope; render(); return; }

  const seatBtn = e.target.closest("[data-seat]");
  if (seatBtn){ seat=seatBtn.dataset.seat; store.set("cg_seat",seat); state.scope="mine"; state.pickSeat=false; render(); return; }

  const act = e.target.closest("[data-act]");
  if (act){
    const a=act.dataset.act;
    if (a==="gotomine"){ state.tab="prep"; state.scope="mine"; state.topic=null; render(); }
    else if (a==="changeseat"){ state.pickSeat=true; render(); }
    else if (a==="cancelpick"){ state.pickSeat=false; render(); }
    else if (a==="reset"){ if(confirm("Clear every readiness mark for this device?")){ Q.forEach((_,i)=>store.del(rKey(i))); render(); } }
    return;
  }

  const rateBtn = e.target.closest(".rate button");
  if (rateBtn){
    const card=e.target.closest(".card"), idx=card.dataset.idx, val=rateBtn.dataset.r;
    const next = store.get(rKey(idx))===val ? "" : val;
    if (next) store.set(rKey(idx),next); else store.del(rKey(idx));
    card.querySelectorAll(".rate button").forEach(b=>b.classList.remove("on","ok"));
    if (next){ rateBtn.classList.add("on"); if(next==="solid") rateBtn.classList.add("ok"); }
    card.classList.toggle("solid", next==="solid");
    return;
  }

  const top = e.target.closest(".card-top");
  if (top){
    const card=top.closest(".card"); const open=card.classList.toggle("open");
    top.setAttribute("aria-expanded", open?"true":"false");
    const hint=card.querySelector(".hint"); if(hint) hint.childNodes[1].textContent = open?" Tap to hide talking points":" Tap to reveal talking points";
  }
});
screenEl.addEventListener("keydown",(e)=>{
  const top=e.target.closest(".card-top");
  if (top && (e.key==="Enter"||e.key===" ")){ e.preventDefault(); top.click(); }
});

render();

/* ================= PWA ================= */
if ("serviceWorker" in navigator){
  window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}
</script>
